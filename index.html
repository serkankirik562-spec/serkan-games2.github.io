<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
color:white;
}

/* 🌌 UZAY ARKA PLAN */
.space{
position:absolute;
width:100%;
height:100%;
z-index:-2;
background:linear-gradient(120deg,#000,#0a0a2a,#1a0033,#000814);
background-size:300% 300%;
animation:spaceMove 10s ease-in-out infinite;
}

@keyframes spaceMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ✨ YILDIZLAR */
.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.6;
animation:floatStar 6s linear infinite;
}

@keyframes floatStar{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* TOP BAR */
.topbar{
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:rgba(10,10,30,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(120,80,255,0.2);
}

.logo{
color:#b38cff;
font-weight:bold;
text-shadow:0 0 10px #6a5acd;
}

.search-box input{
padding:7px;
border:none;
border-radius:6px;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

.right{
display:flex;
gap:15px;
align-items:center;
}

.clock{
color:#b38cff;
font-size:13px;
}

.settings{
cursor:pointer;
transition:0.3s;
}

.settings:hover{
transform:rotate(90deg);
color:#ffffff;
}

/* ORTA IŞIK */
.glow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:400px;
height:400px;
background:radial-gradient(circle,rgba(120,80,255,0.25),transparent 70%);
animation:pulse 5s ease-in-out infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.3);}
100%{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<div class="space"></div>

<div class="stars" id="stars"></div>

<div class="topbar">
<div class="logo">SERKAN GAMES</div>

<div class="search-box">
<input placeholder="Oyun ara...">
</div>

<div class="right">
<div id="clock"></div>
<div class="settings">⚙️</div>
</div>
</div>

<div class="glow"></div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString("tr-TR")+" | "+new Date().toLocaleDateString("tr-TR");
},1000);

/* STARS */
const stars=document.getElementById("stars");

for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

</script>

</body>
</html>
