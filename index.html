<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#333;
}

/* ANA LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 50px);
}

/* SOL LİSTE */
.left{
  width:30%;
  background:#1b1b1b;
  overflow-y:auto;
  padding:10px;
}

.game-card{
  display:flex;
  gap:10px;
  padding:10px;
  margin-bottom:10px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
  align-items:center;
}

.game-card img{
  width:60px;
  height:60px;
  background:#444;
  border-radius:8px;
}

/* SAĞ İNCELEME */
.right{
  width:70%;
  padding:20px;
}

.preview{
  background:#222;
  padding:15px;
  border-radius:15px;
}

.preview img{
  width:100%;
  max-width:400px;
  border-radius:10px;
  background:#444;
}

/* BUTON */
button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:orange;
}
</style>
</head>

<body>

<div class="header">
  <div>🎮 Serkan Games</div>
  <div>Ayar</div>
</div>

<div class="container">

  <!-- 🔥 SOL MENÜ -->
  <div class="left">

    <div class="game-card" onclick="openGame('xox')">
      <img src="https://via.placeholder.com/60">
      <div>XOX Oyunu</div>
    </div>

    <div class="game-card" onclick="openGame('memory')">
      <img src="https://via.placeholder.com/60">
      <div>Hafıza Oyunu</div>
    </div>

    <div class="game-card" onclick="openGame('dice')">
      <img src="https://via.placeholder.com/60">
      <div>Zar Oyunu</div>
    </div>

  </div>

  <!-- 🔥 SAĞ İNCELEME -->
  <div class="right">

    <div class="preview" id="preview">

      <h2>Oyun Seç</h2>
      <p>Soldan bir oyun seç</p>

    </div>

  </div>

</div>

<script>

function openGame(game){

  let box = document.getElementById("preview");

  if(game=="xox"){
    box.innerHTML=`
      <h2>❌⭕ XOX Oyunu</h2>
      <img src="https://via.placeholder.com/400x200"><br>
      <p>XOX yapay zekâ oyunu. X veya O seç ve oyna.</p>
      <button onclick="play('xox')">▶ Oyna</button>
    `;
  }

  if(game=="memory"){
    box.innerHTML=`
      <h2>🧠 Hafıza Oyunu</h2>
      <img src="https://via.placeholder.com/400x200"><br>
      <p>Kartları eşleştir ve hafızanı test et.</p>
      <button onclick="play('memory')">▶ Oyna</button>
    `;
  }

  if(game=="dice"){
    box.innerHTML=`
      <h2>🎲 Zar Oyunu</h2>
      <img src="https://via.placeholder.com/400x200"><br>
      <p>Zar at ve skor topla.</p>
      <button onclick="play('dice')">▶ Oyna</button>
    `;
  }
}

function play(game){
  alert(game + " oyunu açılıyor (buraya gerçek oyun bağlanacak)");
}

</script>

</body>
</html>
