<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#888;
color:#fff;
}

input{
padding:5px;
border-radius:6px;
border:none;
}

.settings{
cursor:pointer;
position:relative;
}

.panel{
display:none;
position:absolute;
right:0;
top:30px;
background:#222;
color:#fff;
padding:10px;
border-radius:8px;
}
</style>

</head>
<body>

<div class="top">

<div>SERKAN GAMES</div>

<div id="clock">00:00:00</div>

<div>
<input placeholder="ara">
</div>

<div class="settings" onclick="toggle()">⚙
<div id="panel" class="panel">
<button onclick="pc()">PC</button>
<button onclick="mobile()">Mobil</button>
</div>
</div>

</div>

<script>
setInterval(()=>{
let d=new Date();
clock.innerText=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
},1000);

function toggle(){
panel.style.display = panel.style.display=="block"?"none":"block";
}

function pc(){
document.body.style.maxWidth="1200px";
document.body.style.margin="auto";
}

function mobile(){
document.body.style.maxWidth="100%";
document.body.style.margin="0";
}
</script>

</body>
</html>
