<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
  body {
    margin: 0;
    font-family: Arial;

    /* 🌌 UZAY ARKA PLAN */
    background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa') no-repeat center center fixed;
    background-size: cover;

    overflow: hidden;
    color: white;
  }

  /* ⭐ YILDIZLAR */
  #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: fall linear infinite;
  }

  @keyframes fall {
    from { transform: translateY(-10px); opacity: 1; }
    to { transform: translateY(100vh); opacity: 0; }
  }

  /* 🔝 ÜST BAR (AYNI KALDI) */
  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 999;
  }

  #logo {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  #search {
    width: 40%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    outline: none;
  }

  #right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #clock {
    font-size: 14px;
  }

  #settings {
    background: #222;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
  }

  #settings:hover {
    background: #444;
  }
</style>
</head>

<body>

<!-- ⭐ YILDIZLAR -->
<div id="stars"></div>

<!-- 🔝 ÜST BAR (DEĞİŞMEDİ) -->
<div id="topbar">
  <div id="logo">SERKAN GAMES</div>

  <input id="search" type="text" placeholder="Oyun ara...">

  <div id="right">
    <div id="clock"></div>
    <button id="settings">⚙ Ayarlar</button>
  </div>
</div>

<script>
/* ⏰ SAAT */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* ⭐ YILDIZ OLUŞTURMA */
const starsContainer = document.getElementById("stars");

function createStar() {
  const star = document.createElement("div");
  star.classList.add("star");

  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.animationDuration = (2 + Math.random() * 5) + "s";
  star.style.opacity = Math.random();

  starsContainer.appendChild(star);

  setTimeout(() => {
    star.remove();
  }, 7000);
}

setInterval(createStar, 80);
</script>

</body>
</html>
