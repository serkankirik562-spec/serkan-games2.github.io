<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    background-size:cover;
    background-position:center;
}

/* TOP BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(50,50,50,0.9);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
}

.logo{font-weight:bold;}

.right{
    display:flex;
    gap:15px;
    align-items:center;
}

/* MENU */
.menu{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.tile{
    width:120px;
    height:80px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.2s;
    position:relative;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:12px;
}

.tile img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    opacity:0.7;
}

.tile span{
    position:relative;
    z-index:2;
    font-weight:bold;
}

/* PLUS TILE */
.plus{
    font-size:30px;
    background:#111;
}

/* GALLERY */
input{
    display:none;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>
    <div>⚙️</div>
</div>

<!-- GALERİ INPUT -->
<input type="file" id="file" accept="image/*" onchange="addCustom(event)">

<!-- MENU -->
<div class="menu">

    <div class="tile" onclick="setBg(0)">
        <img src="https://images.unsplash.com/photo-1603481546579-65d935ba6a7c">
        <span>CS / FPS</span>
    </div>

    <div class="tile" onclick="setBg(1)">
        <img src="https://images.unsplash.com/photo-1614294148960-9aa740632a87">
        <span>Metin2 RPG</span>
    </div>

    <div class="tile" onclick="setBg(2)">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <span>Minecraft</span>
    </div>

    <div class="tile" onclick="setBg(3)">
        <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa">
        <span>Mortal Kombat</span>
    </div>

    <div class="tile" onclick="setBg(4)">
        <img src="https://images.unsplash.com/photo-1526498460520-4c246339dccb">
        <span>Super Mario</span>
    </div>

    <div class="tile" onclick="setBg(5)">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <span>PUBG</span>
    </div>

    <!-- PROJE + -->
    <div class="tile plus" onclick="document.getElementById('file').click()">
        <span>+</span>
    </div>

</div>

<script>

let backgrounds = [
"https://images.unsplash.com/photo-1603481546579-65d935ba6a7c",
"https://images.unsplash.com/photo-1614294148960-9aa740632a87",
"https://images.unsplash.com/photo-1542751371-adc38448a05e",
"https://images.unsplash.com/photo-1618336753974-aae8e04506aa",
"https://images.unsplash.com/photo-1526498460520-4c246339dccb",
"https://images.unsplash.com/photo-1511512578047-dfb367046420"
];

// yüklenmiş customlar
let custom = JSON.parse(localStorage.getItem("custom") || "[]");

function setBg(i){
    let bg;

    if(i < backgrounds.length){
        bg = backgrounds[i];
    }else{
        bg = custom[i - backgrounds.length];
    }

    document.body.style.backgroundImage = `url('${bg}')`;
    localStorage.setItem("bg", bg);
}

// yükle
window.onload = () => {
    let saved = localStorage.getItem("bg");
    if(saved){
        document.body.style.backgroundImage = `url('${saved}')`;
    }
}

// GALERİ EKLE
function addCustom(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        custom.push(reader.result);
        localStorage.setItem("custom", JSON.stringify(custom));
        alert("Tema eklendi! Menüye yeni resim olarak kaydedildi.");
    }

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
