<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games // HACK MODE</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:#00ff88;
overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas#matrix{
position:fixed;
top:0;left:0;
z-index:-1;
}

/* TOP */
.top{
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px #00ff88;
border-bottom:1px solid #00ff88;
}

/* MENU */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:15px;
}

.card{
background:rgba(0,255,136,0.1);
border:1px solid #00ff88;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
box-shadow:0 0 10px #00ff88;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff88;
}

/* GAME */
.gameScreen{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
z-index:999;
flex-direction:column;
}

.gameTop{
padding:10px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #00ff88;
}

.closeBtn{
background:red;
border:none;
color:white;
padding:5px 10px;
cursor:pointer;
}

.gameBody{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

/* ITEMS */
.item{
padding:10px;
border:1px solid #00ff88;
cursor:pointer;
border-radius:8px;
}

/* CANVAS */
canvas{
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="top">☠ SERKAN GAMES // HACK MODE ☠</div>

<div class="container">

<div class="card" onclick="openGame('cake')">🍰 CAKE</div>
<div class="card" onclick="openGame('ice')">🍦 ICE</div>
<div class="card" onclick="openGame('puzzle')">🧠 PUZZLE</div>
<div class="card" onclick="openGame('draw')">🎨 DRAW</div>
<div class="card" onclick="openGame('sculpt')">🗿 SCULPT</div>

</div>

<div class="gameScreen" id="game">

<div class="gameTop">
<span id="title"></span>
<button class="closeBtn" onclick="closeGame()">X</button>
</div>

<div class="gameBody" id="body"></div>

</div>

<script>

/* MATRIX EFFECT */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01SERKANGAMESHACKMODE";
letters=letters.split("");

let font=14;
let cols=c.width/font;
let drops=[];

for(let x=0;x<cols;x++) drops[x]=1;

function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff88";
ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(drawMatrix,33);

/* GAME ENGINE */
let score=0;

function openGame(type){
document.getElementById("game").style.display="flex";
let title="";
let html="";

if(type=="cake"){
title="🍰 CAKE SYSTEM";
html=`
<div class="item" onclick="add()">UN</div>
<div class="item" onclick="add()">YUMURTA</div>
<div class="item" onclick="add()">ŞEKER</div>
<p id="score">0</p>
`;
}

if(type=="ice"){
title="🍦 ICE SYSTEM";
html=`
<div class="item" onclick="add()">TOP EKLE</div>
<p id="score">0</p>
`;
}

if(type=="puzzle"){
title="🧠 PUZZLE CORE";
html=`
<button onclick="shuffle()">MIX</button>
<p id="score">READY</p>
`;
}

if(type=="draw"){
title="🎨 DRAW MODE";
html=`
<canvas id="draw" width="250" height="250"></canvas>
`;
setTimeout(initDraw,100);
}

if(type=="sculpt"){
title="🗿 SCULPT MODE";
html=`
<button onclick="add()">HIT</button>
<p id="score">0</p>
`;
}

document.getElementById("title").innerText=title;
document.getElementById("body").innerHTML=html;
score=0;
}

function closeGame(){
document.getElementById("game").style.display="none";
}

function add(){
score++;
document.getElementById("score").innerText=score;
}

function shuffle(){
document.getElementById("score").innerText="SHUFFLED ⚡";
}

/* DRAW */
function initDraw(){
let c=document.getElementById("draw");
if(!c) return;
let ctx=c.getContext("2d");

c.onmousemove=(e)=>{
if(e.buttons==1){
ctx.fillStyle="#00ff88";
ctx.fillRect(e.offsetX,e.offsetY,4,4);
}
}
}

</script>

</body>
</html>
