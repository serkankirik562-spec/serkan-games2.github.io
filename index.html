<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* TOP BAR */
.topbar {
  background: #777;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  position: relative;
}

.search input {
  padding: 6px;
  border: none;
  border-radius: 5px;
}

.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-weight: bold;
}

.settings {
  cursor: pointer;
  font-size: 22px;
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  right: 10px;
  top: 45px;
  background: white;
  color: black;
  border-radius: 8px;
  min-width: 160px;
  overflow: hidden;
}

.dropdown div {
  padding: 10px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.dropdown div:hover {
  background: #eee;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: transparent;
}

.active-dot {
  background: green;
}

/* OYUN ALANI */
.container {
  padding: 20px;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #222;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  margin: 5px;
  cursor: pointer;
}

/* BOARD */
#board {
  display: grid;
  gap: 5px;
  justify-content: center;
}

.cell {
  width: 90px;
  height: 90px;
  background: #444;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  cursor: pointer;
  color: white;
}

/* PC / MOBILE */
.pc #board {
  grid-template-columns: repeat(5, 90px);
}

.mobile #board {
  grid-template-columns: repeat(3, 90px);
}
</style>
</head>

<body id="body" class="pc">

<!-- TOP BAR -->
<div class="topbar">

  <div class="search">
    <input type="text" placeholder="Oyun ara...">
  </div>

  <div class="logo">🎮 Serkan Games</div>

  <div class="settings" onclick="toggleMenu()">⚙️</div>

  <div class="dropdown" id="dropdown">

    <div onclick="setMode('pc')">
      💻 PC
      <span class="dot" id="pcDot"></span>
    </div>

    <div onclick="setMode('mobile')">
      📱 Mobil
      <span class="dot" id="mobileDot"></span>
    </div>

  </div>

</div>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>❌⭕ XOX OYUNU</h1>

  <p>Seçim yap:</p>

  <button onclick="setPlayer('X')">X Oyna (Sen başla)</button>
  <button onclick="setPlayer('O')">O Oyna (AI başlar)</button>

  <button onclick="startGame()">▶️ OYNA</button>
</div>

<!-- GAME -->
<div class="container">
  <div id="board"></div>
  <h2 id="status"></h2>
</div>

<script>

let dropdown = document.getElementById("dropdown");

function toggleMenu(){
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
}

/* PC / MOBILE */
function setMode(mode){
  let body = document.getElementById("body");

  body.classList.remove("pc","mobile");

  document.getElementById("pcDot").classList.remove("active-dot");
  document.getElementById("mobileDot").classList.remove("active-dot");

  if(mode === "mobile"){
    body.classList.add("mobile");
    document.getElementById("mobileDot").classList.add("active-dot");
  } else {
    body.classList.add("pc");
    document.getElementById("pcDot").classList.add("active-dot");
  }

  dropdown.style.display = "none";
}

/* DEFAULT PC */
document.getElementById("pcDot").classList.add("active-dot");

/* ===== XOX AI ===== */

let board = [];
let current = "X";
let player = "X";
let ai = "O";
let gameOver = false;

function setPlayer(p){
  player = p;
  ai = (p === "X") ? "O" : "X";
}

function startGame(){
  document.getElementById("startScreen").style.display = "none";
  reset();
}

function reset(){
  board = ["","","","","","","","",""];
  current = "X";
  gameOver = false;
  draw();
  updateStatus();
}

function draw(){
  let b = document.getElementById("board");
  b.innerHTML = "";

  board.forEach((c,i)=>{
    let d = document.createElement("div");
    d.className = "cell";
    d.innerText = c;
    d.onclick = ()=>play(i);
    b.appendChild(d);
  });
}

function play(i){
  if(gameOver || board[i] !== "") return;
  if(current !== player) return;

  board[i] = player;

  if(checkWin(player)){
    end(player);
    return;
  }

  current = ai;
  draw();

  setTimeout(aiMove, 400);
}

function aiMove(){
  if(gameOver) return;

  let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  let move = empty[Math.floor(Math.random()*empty.length)];

  board[move] = ai;

  if(checkWin(ai)){
    end(ai);
    return;
  }

  current = player;
  draw();
  updateStatus();
}

function checkWin(p){
  const w=[[0,1,2],[3,4,5],[6,7,8],
           [0,3,6],[1,4,7],[2,5,8],
           [0,4,8],[2,4,6]];

  return w.some(a=>
    board[a[0]]===p &&
    board[a[1]]===p &&
    board[a[2]]===p
  );
}

function end(winner){
  gameOver = true;
  document.getElementById("status").innerText = winner + " kazandı!";
}

function updateStatus(){
  document.getElementById("status").innerText =
    (current === player) ? "Sen oynuyorsun" : "AI düşünüyor...";
}

</script>

</body>
</html>
