<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow-x: hidden;
}

/* ARKA PLAN */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    z-index: -2;
}

.glow-bg {
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg,#00ffcc,#ff00ff,#00aaff);
    opacity: 0.12;
    animation: move 10s linear infinite;
    z-index: -1;
}

@keyframes move {
    0%{transform:translate(0,0);}
    50%{transform:translate(-15%,-15%);}
    100%{transform:translate(0,0);}
}

/* NAVBAR (AYNI KALDI) */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    box-sizing: border-box;
    z-index: 10;
}

.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #00ffcc;
}

.title {
    font-weight: bold;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

.clock {
    font-size: 14px;
}

.search input {
    padding: 6px;
    border-radius: 8px;
    border: none;
}

.right button {
    background: transparent;
    border: 1px solid #00ffcc;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
}

/* OYUN ALANI */
.games {
    margin-top: 90px;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffcc;
}

button.play {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #00ffcc;
    cursor: pointer;
}

button.play:hover {
    background: #00ffaa;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow-bg"></div>

<!-- ÜST BAR (AYNI) -->
<div class="navbar">

    <div class="left">
        <div class="logo"></div>
        <div class="title">SERKAN GAMES</div>
    </div>

    <div class="clock" id="clock"></div>

    <div class="search">
        <input placeholder="Ara...">
    </div>

    <div class="right">
        <button>Ayarlar</button>
    </div>

</div>

<!-- OYUNLAR -->
<div class="games">

    <div class="card">
        <h3>Snake</h3>
        <button class="play" onclick="openGame('https://play.google.com/store/apps/details?id=com.amelosinteractive.snake')">Oyna</button>
    </div>

    <div class="card">
        <h3>Hair Tattoo</h3>
        <button class="play" onclick="openGame('https://play.google.com/store/apps/details?id=com.wn.hairtattoo')">Oyna</button>
    </div>

    <div class="card">
        <h3>Real Sniper</h3>
        <button class="play" onclick="openGame('https://play.google.com/store/apps/details?id=com.miniclip.realsniper')">Oyna</button>
    </div>

    <div class="card">
        <h3>Turning</h3>
        <button class="play" onclick="openGame('https://play.google.com/store/apps/details?id=com.Eliten.Turning')">Oyna</button>
    </div>

</div>

<script>
function openGame(url){
    window.open(url, "_blank");
}

function clock(){
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
