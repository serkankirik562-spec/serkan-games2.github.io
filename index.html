<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#1e293b;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

.logo{font-weight:bold;}

#search{
padding:6px;
border-radius:8px;
border:none;
}

.money{
color:#38bdf8;
margin-right:10px;
}

/* OYUN KARTLARI */
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
padding-top:80px;
gap:10px;
padding:80px 10px 10px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

/* MODAL */
#gameModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000ee;
display:none;
z-index:9999;
}

#modalContent{
width:90%;
height:90%;
margin:2% auto;
background:#1e293b;
border-radius:15px;
position:relative;
}

#closeBtn{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

/* PROFILE */
#profileBox{
display:none;
position:fixed;
top:60px;
right:10px;
background:#1e293b;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">🎮 Serkan Games</div>

<input id="search" placeholder="Oyun ara...">

<div>
<span class="money">💰 <span id="money">0</span></span>
<span onclick="toggleProfile()" style="cursor:pointer;">Serkan ▼</span>
</div>
</div>

<!-- PROFİL -->
<div id="profileBox">
<p>🏆 Kazan: +10</p>
<p>🤝 Beraberlik: +5</p>
<p>❌ Kaybet: +1</p>
<button onclick="toggleProfile()">Kapat</button>
</div>

<!-- OYUNLAR -->
<div class="games">

<div class="card" onclick="openGame('xox.html')">
<h3>❌⭕ XOX AI</h3>
</div>

<div class="card" onclick="openGame('araba-oyunu.html')">
<h3>🚗 Araba Oyunu</h3>
</div>

</div>

<!-- MODAL -->
<div id="gameModal">
<div id="modalContent">
<div id="closeBtn" onclick="closeGame()">❌</div>
<iframe id="gameFrame" style="width:100%;height:100%;border:none;"></iframe>
</div>
</div>

<script>

// PARA
let money = localStorage.getItem("money") || 0;
document.getElementById("money").innerText = money;

// MODAL
function openGame(url){
document.getElementById("gameModal").style.display="block";
document.getElementById("gameFrame").src=url;
}

function closeGame(){
document.getElementById("gameModal").style.display="none";
document.getElementById("gameFrame").src="";
}

// PROFİL
function toggleProfile(){
let p = document.getElementById("profileBox");
p.style.display = p.style.display=="block" ? "none":"block";
}

</script>

</body>
</html>
