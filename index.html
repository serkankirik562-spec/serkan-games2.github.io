<div id="ozel-gun"></div>

<script>
const bugun = new Date();

// --- SABİT ÖZEL GÜNLER ---
const ozelGunler = [
  { ad: "🎆 Yeni Yıl", bas: "2026-01-01", bit: "2026-01-01" },
  { ad: "👧 23 Nisan Ulusal Egemenlik ve Çocuk Bayramı", bas: "2026-04-23", bit: "2026-04-23" },
  { ad: "🧑‍💼 1 Mayıs Emek ve Dayanışma Günü", bas: "2026-05-01", bit: "2026-05-01" },
  { ad: "🇹🇷 19 Mayıs Atatürk’ü Anma Gençlik ve Spor Bayramı", bas: "2026-05-19", bit: "2026-05-19" },
  { ad: "🐑 Kurban Bayramı", bas: "2026-05-26", bit: "2026-05-30" },
  { ad: "🛡️ 15 Temmuz Demokrasi Günü", bas: "2026-07-15", bit: "2026-07-15" },
  { ad: "🇹🇷 30 Ağustos Zafer Bayramı", bas: "2026-08-30", bit: "2026-08-30" },
  { ad: "🇹🇷 29 Ekim Cumhuriyet Bayramı", bas: "2026-10-29", bit: "2026-10-29" }
];

// --- TARİH KONTROL ---
let aktifGun = null;

for (let i = 0; i < ozelGunler.length; i++) {
  const g = ozelGunler[i];
  const bas = new Date(g.bas);
  const bit = new Date(g.bit);

  if (bugun >= bas && bugun <= bit) {
    aktifGun = g.ad;
    break;
  }
}

// --- EKRANA YAZ ---
const alan = document.getElementById("ozel-gun");

if (aktifGun) {
  alan.innerHTML = aktifGun;
  alan.style.background = "gold";
  alan.style.padding = "12px";
  alan.style.textAlign = "center";
  alan.style.fontSize = "20px";
  alan.style.fontWeight = "bold";
} else {
  alan.style.display = "none";
}
</script>
