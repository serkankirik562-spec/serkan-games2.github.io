<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

/* ÜST BAR */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#888;
color:#fff;
}

/* ARAMA */
input{
padding:5px;
border-radius:6px;
border:none;
}

/* AYAR */
.settings{
cursor:pointer;
position:relative;
}

/* PANEL */
.panel{
display:none;
position:absolute;
right:0;
top:30px;
background:#222;
color:#fff;
padding:10px;
border-radius:8px;
}

button{
display:block;
margin:5px 0;
padding:5px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>
<body>

<!-- TOP BAR -->
<div class="top">

<div>SERKAN GAMES</div>

<div id="clock">00:00:00</div>

<div>
<input placeholder="ara">
</div>

<div class="settings" onclick="toggle()">⚙
<div id="panel" class="panel">
<button onclick="pc()">PC</button>
<button onclick="mobile()">Mobil</button>
</div>
</div>

</div>

<script>

/////////////////////
// CANLI SAAT (DÜZELTİLDİ)
/////////////////////
setInterval(()=>{
let d=new Date();

document.getElementById("clock").innerText =
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");

},1000);

/////////////////////
// AYAR MENÜSÜ
/////////////////////
function toggle(){
let panel=document.getElementById("panel");
panel.style.display = panel.style.display=="block"?"none":"block";
}

/////////////////////
// PC MOD
/////////////////////
function pc(){
document.body.style.maxWidth="1200px";
document.body.style.margin="auto";
}

/////////////////////
// MOBİL MOD
/////////////////////
function mobile(){
document.body.style.maxWidth="100%";
document.body.style.margin="0";
}

</script>

</body>
</html>
