<!DOCTYPE html>
<html>
<head>
    <title>Serkan Games</title>
</head>

<body style="
margin:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
">

<input id="search"
placeholder="Ara..."
style="
width:70%;
max-width:650px;
padding:16px;
font-size:18px;
border-radius:30px;
border:none;
outline:none;
text-align:center;
">

<button onclick="ara()"
style="
margin-top:15px;
padding:10px 25px;
border-radius:20px;
border:none;
cursor:pointer;
">
Ara
</button>

<script>
function ara(){
    let t = document.getElementById("search").value;
    alert("Aradın: " + t);
}
</script>

</body>
</html>
