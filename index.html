<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f0f0f,#1c1c1c,#2a2a2a,#111);
    background-size:400% 400%;
    animation: bgMove 10s ease infinite;
}

/* ANİMASYON ARKA PLAN */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(60,60,60,0.85);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.logo{
    font-weight:bold;
    letter-spacing:1px;
}

.search-box input{
    width:250px;
    padding:7px;
    border:none;
    border-radius:6px;
    outline:none;
}

.right{
    display:flex;
    gap:15px;
    align-items:center;
}

.clock{
    font-size:14px;
}

.settings{
    cursor:pointer;
    transition:0.3s;
}

.settings:hover{
    transform:rotate(90deg) scale(1.2);
    color:#00ffff;
}

/* ORTA PARLAMA EFEKTİ */
.glow{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:300px;
    background:radial-gradient(circle,rgba(0,255,255,0.2),transparent 70%);
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.3);}
    100%{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search-box">
        <input placeholder="Oyun ara...">
    </div>

    <div class="right">
        <div id="clock"></div>
        <div class="settings">⚙️</div>
    </div>
</div>

<div class="glow"></div>

<script>
function clock(){
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("tr-TR");
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
