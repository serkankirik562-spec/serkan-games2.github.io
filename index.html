<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serkan Games</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: white;
}

/* ÜST BAR */
.header {
    background: #666;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ddd;
}

.search input {
    padding: 7px;
    border: none;
    border-radius: 6px;
    outline: none;
}

/* SAYFA */
.content {
    padding: 20px;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
}

.game-card {
    background: #f2f2f2;
    padding: 15px;
    border-radius: 12px;
}

.btn {
    margin-top: 10px;
    padding: 8px;
    display: block;
    background: #666;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    text-align: center;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">Serkan Games</div>

    <div class="search">
        <input type="text" placeholder="Arama...">
    </div>
</div>

<div class="content">

    <h2>Oyunlar</h2>

    <div class="games">

        <!-- ARTIK ÖRÜMCEK OYUNU YOK -->
        <div class="game-card">
            🎮 Yeni Oyun<br>
            <small>Senin ekleyeceğin oyun</small>

            <a href="#" class="btn">Oyna</a>
            <a href="#" class="btn">İndir</a>
        </div>

    </div>

</div>

</body>
</html>
