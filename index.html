<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    background-size:cover;
    background-position:center;
    overflow:hidden;
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(60,60,60,0.9);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
    backdrop-filter:blur(10px);
}

.logo{font-weight:bold;}

.search-box input{
    width:250px;
    padding:7px;
    border:none;
    border-radius:6px;
    outline:none;
}

.right{
    display:flex;
    gap:15px;
    align-items:center;
}

.settings{
    cursor:pointer;
    font-size:22px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.panel{
    width:80%;
    height:80%;
    background:#222;
    border-radius:12px;
    padding:20px;
    color:white;
    overflow:auto;
}

.games{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:20px;
}

.card{
    cursor:pointer;
    border:2px solid transparent;
    border-radius:10px;
    overflow:hidden;
    transition:0.2s;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.05);
    border:2px solid #00ffcc;
}

.saveBtn{
    margin-top:20px;
    padding:10px;
    width:100%;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search-box">
        <input placeholder="Oyun ara...">
    </div>

    <div class="right">
        <div id="clock"></div>
        <div class="settings" onclick="openMenu()">⚙️</div>
    </div>
</div>

<!-- AYARLAR -->
<div class="modal" id="modal">
    <div class="panel">
        <h2>Tema Seç</h2>

        <div class="games">

            <div class="card" onclick="selectBg(this)">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
                <p>CS / FPS</p>
            </div>

            <div class="card" onclick="selectBg(this)">
                <img src="https://images.unsplash.com/photo-1614294148960-9aa740632a87">
                <p>Metin2 / RPG</p>
            </div>

            <div class="card" onclick="selectBg(this)">
                <img src="https://images.unsplash.com/photo-1603481546579-65d935ba6a7c">
                <p>Battle / Action</p>
            </div>

            <div class="card" onclick="selectBg(this)">
                <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa">
                <p>Fantasy MMO</p>
            </div>

        </div>

        <button class="saveBtn" onclick="saveTheme()">KAYDET</button>
    </div>
</div>

<script>

// SAAT
function clock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("tr-TR");
}
setInterval(clock,1000);
clock();

// MODAL
function openMenu(){
    document.getElementById("modal").style.display="flex";
}

let selectedBg="";

function selectBg(el){
    selectedBg = el.querySelector("img").src;
    alert("Seçildi!");
}

function saveTheme(){
    if(selectedBg!=""){
        document.body.style.backgroundImage=`url(${selectedBg})`;
        localStorage.setItem("bg",selectedBg);
    }
    document.getElementById("modal").style.display="none";
}

// yükle
window.onload=function(){
    let bg = localStorage.getItem("bg");
    if(bg){
        document.body.style.backgroundImage=`url(${bg})`;
    }
}
</script>

</body>
</html>
