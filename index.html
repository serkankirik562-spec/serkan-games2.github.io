<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan James</title>
<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

#topbar {
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.5);
}

#title {
font-size:22px;
font-weight:bold;
}

#gameArea {
display:flex;
padding:20px;
gap:20px;
}

.card {
width:220px;
background:#1c1c1c;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card:hover {
transform:scale(1.05);
}

canvas {
background:#87ceeb;
border-radius:10px;
display:none;
}

.menu {
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:10px;
}

button {
margin:5px;
padding:10px;
}
</style>
</head>

<body>

<div id="topbar">
<div id="title">SERKAN JAMES</div>
<div id="time"></div>
</div>

<div id="gameArea">
<div class="card" onclick="startGame()">
<h3>🕷 Spider Swing</h3>
<p>İpe tutun, zıpla, finish'e ulaş!</p>
</div>

<div class="card">
<h3>⚙ Ayarlar</h3>
<p>Boş menü (hazır)</p>
</div>
</div>

<canvas id="game" width="800" height="400"></canvas>

<div class="menu" id="menu">
<h3>MENÜ</h3>
<button onclick="nextLevel()">İleri</button>
<button onclick="home()">Ev</button>
<button onclick="openSettings()">Ayarlar</button>
</div>

<script>

let timeDiv = document.getElementById("time");
setInterval(()=>{
let d = new Date();
timeDiv.innerHTML = d.toLocaleString();
},1000);

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let x=50,y=300,vx=0,vy=0;
let ground=300;
let holding=false;
let lastTap=0;
let coins=0;
let finishX=700;

function startGame(){
document.getElementById("gameArea").style.display="none";
canvas.style.display="block";
loop();
}

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowRight") vx=3;
if(e.key=="ArrowLeft") vx=-3;
});

document.addEventListener("keyup",()=>vx=0);

// mobil dokunma
document.addEventListener("touchstart",(e)=>{
let now=Date.now();

if(now-lastTap<300){
vy=-8; // double jump
}else{
vx=2; // hold move
}
lastTap=now;
});

document.addEventListener("touchend",()=>{
vx=0;
});

function loop(){
ctx.clearRect(0,0,800,400);

// player
vy+=0.3;
y+=vy;
x+=vx;

if(y>ground){ y=ground; vy=0; }

// rope (basit swing)
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x+30,y-80);
ctx.stroke();

// finish
ctx.fillStyle="gold";
ctx.fillRect(finishX,250,20,100);

// player draw
ctx.fillStyle="red";
ctx.fillRect(x,y-20,20,20);

// coin logic
if(x>finishX){
showMenu();
}

requestAnimationFrame(loop);
}

function showMenu(){
document.getElementById("menu").style.display="block";
}

function nextLevel(){
finishX += 200;
document.getElementById("menu").style.display="none";
}

function home(){
location.reload();
}

function openSettings(){
alert("Ses / Titreşim (hazır sistem)");
}

</script>

</body>
</html>
