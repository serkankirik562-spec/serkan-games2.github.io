<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{margin:0;background:#0b0f17;color:white;font-family:Arial;}
.top{display:flex;justify-content:space-between;padding:10px;background:#151a25;}
.main{padding:10px;}
.card{background:#1c2436;margin:10px;padding:10px;border-radius:10px;}
button{padding:6px;margin:3px;background:#2a6cff;color:white;border:none;border-radius:6px;}
.grid{display:grid;grid-template-columns:repeat(3,60px);}
.cell{width:60px;height:60px;border:1px solid white;display:flex;align-items:center;justify-content:center;}
</style>

</head>
<body>

<div class="top">
<div>🎮 Serkan Games</div>
<div id="coins">💰 0</div>
</div>

<div class="main" id="main"></div>
<div id="game"></div>

<script>

// COIN
let coin = parseInt(localStorage.getItem("coin")||0);
function addCoin(n){
coin+=n;
localStorage.setItem("coin",coin);
coins.innerText="💰 "+coin;
}
coins.innerText="💰 "+coin;

// MENU
function menu(){
main.innerHTML="";

["XOX","Zar","Tıklama","Hedef","Sayı Tahmin","Dama","UNO"].forEach(g=>{
main.innerHTML+=`
<div class="card">
<h3>${g}</h3>
<button onclick="play('${g}')">▶ Oyna</button>
</div>`;
});
}
menu();

// PLAY
function play(name){

game.innerHTML=`
<div class="card">
<h2>${name}</h2>
<button onclick="game.innerHTML=''">⬅</button>
<div id="g"></div>
</div>
`;

if(name=="XOX") xox();
if(name=="Zar") dice();
if(name=="Tıklama") clickGame();
if(name=="Hedef") targetGame();
if(name=="Sayı Tahmin") guessGame();
if(name=="Dama") damaGame();
if(name=="UNO") unoGame();
}

// XOX
function xox(){
let t="X";
g.innerHTML="<div class='grid'></div>";
let b=document.querySelector(".grid");

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.onclick=()=>{
if(!d.innerText){
d.innerText=t;
t=t=="X"?"O":"X";
checkWin();
}
};
b.appendChild(d);
}

function checkWin(){
let c=[...document.querySelectorAll(".cell")].map(x=>x.innerText);

let win=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

win.forEach(w=>{
if(c[w[0]]&&c[w[0]]==c[w[1]]&&c[w[1]]==c[w[2]]){
alert(c[w[0]]+" kazandı");
addCoin(10);
}
});
}
}

// ZAR
function dice(){
g.innerHTML=`<button onclick="roll()">🎲 At</button><div id="r"></div>`;
window.roll=function(){
let n=Math.floor(Math.random()*6)+1;
r.innerText=n;
addCoin(n);
}
}

// TIKLAMA
function clickGame(){
let s=0;
g.innerHTML=`<button id="btn">Tıkla</button><div id="sc">0</div>`;
btn.onclick=()=>{
s++;
sc.innerText=s;
if(s>=10){
addCoin(10);
alert("Kazandın");
}
};
}

// HEDEF
function targetGame(){
g.innerHTML=`<div id="t" style="width:50px;height:50px;background:red;"></div>`;
t.onclick=()=>{
addCoin(10);
alert("Vurdun");
};
}

// TAHMİN
function guessGame(){
let n=Math.floor(Math.random()*5)+1;
let girdi=prompt("1-5 tahmin");
if(parseInt(girdi)==n){
addCoin(10);
alert("Bildin");
}else{
alert("Yanlış");
}
}

// DAMA (basit)
function damaGame(){
g.innerHTML="♟ Basit dama (geliştirilecek ama oynanır)";
addCoin(5);
}

// UNO (basit)
function unoGame(){
let num=Math.floor(Math.random()*10);
let guess=prompt("UNO kart tahmin 0-9");
if(parseInt(guess)==num){
addCoin(15);
alert("Kazandın");
}else{
alert("Kaybettin");
}
}

</script>

</body>
</html>
