<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title><style>
body{
margin:0;
background:linear-gradient(135deg,#000,#001a33);
color:#fff;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* ÜST BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
position:fixed;
top:0;
left:0;
right:0;
z-index:10;
}

.top-bar h1{
margin:0;
font-size:18px;
letter-spacing:1px;
}

.tools{
display:flex;
gap:10px;
align-items:center;
}

input{
padding:6px;
border-radius:6px;
border:none;
outline:none;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#clock{
font-weight:bold;
}

/* GİRİŞ LOGO */
.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#001a33,#000);
z-index:100;
}

.logo{
width:180px;
height:180px;
background:url('logo.png') center/contain no-repeat;
animation:spinOnly 2.5s ease-in-out;
}

@keyframes spinOnly{
0%{transform:rotate(0deg) scale(0.3);opacity:0;}
40%{opacity:1;}
100%{transform:rotate(720deg) scale(1);opacity:1;}
}

/* fade çıkış */
.fade-out{
animation:fadeOut 1.5s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* SEÇİM EKRANI */
.choose-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:90;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
}

.choose-screen h2{
margin-bottom:10px;
}

.choice-buttons{
display:flex;
gap:20px;
}

.choice-buttons button{
padding:20px 30px;
font-size:18px;
border-radius:12px;
background:#001a33;
color:#fff;
border:1px solid #444;
transition:0.3s;
}

.choice-buttons button:hover{
background:#004080;
transform:scale(1.1);
}

</style></head>
<body><!-- GİRİŞ --><div class="intro" id="intro">
  <div class="logo"></div>
</div><!-- SEÇİM EKRANI --><div class="choose-screen" id="chooseScreen">
  <h2>Platform Seç</h2>
  <div class="choice-buttons">
    <button onclick="selectMode('mobile')">📱 Mobil / Tablet</button>
    <button onclick="selectMode('pc')">💻 PC</button>
  </div>
</div><!-- ÜST BAR --><div class="top-bar">
  <h1>Serkan Games</h1>  <div class="tools">
    <div id="clock"></div>
    <input type="text" placeholder="Ara...">
    <button>⚙️</button>
  </div>
</div><script>
// saat
function updateClock(){
let d=new Date();
document.getElementById("clock").innerText = d.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// intro bitince düzgün geçiş
const intro = document.getElementById("intro");
const choose = document.getElementById("chooseScreen");

setTimeout(()=>{
  intro.classList.add("fade-out");

  setTimeout(()=>{
    intro.style.display = "none";
    choose.style.display = "flex";
  },1500);

},3000);

function selectMode(mode){
  choose.style.display = "none";
  alert(mode === 'mobile' ? '📱 Mobil mod seçildi' : '💻 PC mod seçildi');
}
</script></body>
</html>
