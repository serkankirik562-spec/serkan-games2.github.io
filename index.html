<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  padding:10px 15px;
  background:#111;
  color:white;
  gap:15px;
}

.title{
  font-weight:bold;
  font-size:18px;
}

.clock{
  color:#00ffcc;
  font-size:16px;
}

/* arama sağa it */
.search{
  margin-left:auto;
  padding:6px;
  border-radius:6px;
  border:none;
  width:180px;
}

.settings{
  font-size:22px;
  cursor:pointer;
}

/* OYUN ALANI */
.box{
  text-align:center;
  margin-top:60px;
}

button{
  padding:15px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
}

#msg{
  font-size:20px;
  margin-top:15px;
}

#score{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="title">SERKAN GAMES</div>

  <div class="clock" id="clock">00:00:00</div>

  <input class="search" placeholder="Ara...">

  <div class="settings">⚙️</div>
</div>

<!-- OYUN -->
<div class="box">
  <h2>💇 Kuaför Simülasyonu</h2>

  <p id="customer">Müşteri hazır...</p>

  <button onclick="action('kes')">✂️ Kes</button>
  <button onclick="action('boya')">🎨 Boya</button>
  <button onclick="action('tara')">💈 Tara</button>

  <div id="msg"></div>
  <div id="score">Puan: 0</div>
</div>

<script>
/* SAAT */
function updateClock(){
  document.getElementById("clock").innerText =
  new Date().toLocaleTimeString("tr-TR");
}
setInterval(updateClock,1000);
updateClock();

/* OYUN */
let score = 0;
let actions = ["kes","boya","tara"];

function newCustomer(){
  window.target = actions[Math.floor(Math.random()*actions.length)];
  document.getElementById("customer").innerText =
  "Müşteri istedi: " + window.target;
}

function action(x){
  if(x === window.target){
    score += 10;
    document.getElementById("msg").innerText = "✔ Doğru! +10";
  } else {
    score -= 5;
    document.getElementById("msg").innerText = "❌ Yanlış! -5";
  }

  document.getElementById("score").innerText = "Puan: " + score;
  setTimeout(newCustomer, 800);
}

newCustomer();
</script>

</body>
</html>
