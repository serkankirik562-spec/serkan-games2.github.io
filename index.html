<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  padding:10px 15px;
  background:#111;
  color:white;
  gap:15px;
}

.title{
  font-weight:bold;
  font-size:18px;
}

.clock{
  color:#00ffcc;
  font-size:16px;
}

/* search */
.search{
  margin-left:auto;
  padding:6px;
  border-radius:6px;
  border:none;
  width:180px;
}

.settings{
  font-size:22px;
  cursor:pointer;
}

/* SPECIAL DAY BAR */
.special{
  text-align:center;
  background:#ffcc00;
  padding:8px;
  font-weight:bold;
}

/* GAME */
.box{
  text-align:center;
  margin-top:40px;
}

button{
  padding:15px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
}

#msg{
  font-size:20px;
  margin-top:15px;
}

#score{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="title">SERKAN GAMES</div>

  <div class="clock" id="clock">00:00:00</div>

  <input class="search" placeholder="Ara...">

  <div class="settings">⚙️</div>
</div>

<!-- ÖZEL GÜN -->
<div class="special" id="specialDay">
Özel gün kontrol ediliyor...
</div>

<!-- OYUN -->
<div class="box">
  <h2>💇 Kuaför Simülasyonu</h2>

  <p id="customer">Müşteri hazır...</p>

  <button onclick="action('kes')">✂️ Kes</button>
  <button onclick="action('boya')">🎨 Boya</button>
  <button onclick="action('tara')">💈 Tara</button>

  <div id="msg"></div>
  <div id="score">Puan: 0</div>
</div>

<script>

/* SAAT */
function updateClock(){
  document.getElementById("clock").innerText =
  new Date().toLocaleTimeString("tr-TR");
}
setInterval(updateClock,1000);
updateClock();

/* ÖZEL GÜNLER */
function checkSpecialDay(){
  const d = new Date();
  const m = d.getMonth()+1;
  const day = d.getDate();

  let msg = "Bugün normal bir gün.";

  if(m==1 && day==1) msg="🎉 Yeni Yıl Kutlu Olsun!";
  if(m==4 && day==23) msg="🇹🇷 23 Nisan Kutlu Olsun!";
  if(m==5 && day==19) msg="🇹🇷 19 Mayıs Kutlu Olsun!";
  if(m==10 && day==29) msg="🇹🇷 29 Ekim Cumhuriyet Bayramı!";

  document.getElementById("specialDay").innerText = msg;
}
checkSpecialDay();

/* GAME */
let score = 0;
let actions = ["kes","boya","tara"];

function newCustomer(){
  window.target = actions[Math.floor(Math.random()*actions.length)];
  document.getElementById("customer").innerText =
  "Müşteri istedi: " + window.target;
}

function action(x){
  if(x === window.target){
    score += 10;
    document.getElementById("msg").innerText = "✔ Doğru! +10";
  } else {
    score -= 5;
    document.getElementById("msg").innerText = "❌ Yanlış! -5";
  }

  document.getElementById("score").innerText = "Puan: " + score;
  setTimeout(newCustomer, 700);
}

newCustomer();

</script>

</body>
</html>
