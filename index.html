<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#333;
}

.search input{
  padding:6px;
  border-radius:6px;
  border:none;
}

/* MENU BAR */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:#1b1b1b;
}

.menu button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

/* CARDS */
.card{
  width:180px;
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:12px;
  display:inline-block;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100px;
  background:#444;
  border-radius:10px;
}

/* GAME BOX */
.game-box{
  width:320px;
  margin:auto;
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* XOX */
#board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

.cell{
  width:80px;
  height:80px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🎮 Serkan Games</div>

  <div class="search">
    <input placeholder="Ara...">
  </div>

  <div>⚙ Ayar</div>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="show('home')">🏠 Ana</button>
  <button onclick="show('mini')">🕹 Mini Games</button>
  <button onclick="show('boardgames')">🧩 Masa Oyunları</button>
</div>

<!-- HOME -->
<div id="home" class="page" style="display:block;">
  <h2>Serkan Games 🎮</h2>
  <p>Mini oyun platformu</p>
</div>

<!-- MINI GAMES -->
<div id="mini" class="page">

  <h2>🕹 Mini Games</h2>

  <div class="card" onclick="openGame('xox')">
    <img>
    <p>XOX AI</p>
  </div>

  <div class="card" onclick="openGame('memory')">
    <img>
    <p>Hafıza</p>
  </div>

  <div class="card" onclick="openGame('dice')">
    <img>
    <p>Zar</p>
  </div>

</div>

<!-- MASA OYUNLARI -->
<div id="boardgames" class="page">

  <h2>🧩 Masa Oyunları</h2>

  <div class="card" onclick="openGame('xox')">
    <img>
    <p>XOX</p>
  </div>

</div>

<!-- GAME AREA -->
<div id="game" class="page">

  <button onclick="back()">← Geri</button>
  <div id="gameArea"></div>

</div>

<script>

/* SAYFA */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

/* GERİ */
function back(){
  show("mini");
}

/* OYUN AÇ */
function openGame(type){

  show("game");

  let area=document.getElementById("gameArea");

  if(type=="xox"){
    area.innerHTML=`
      <div class="game-box">
        <h3>XOX AI</h3>
        <div id="board"></div>
      </div>
    `;
    startXOX();
  }

  if(type=="memory"){
    area.innerHTML="<div class='game-box'>Hafıza (bağlı)</div>";
  }

  if(type=="dice"){
    area.innerHTML="<div class='game-box'>Zar (bağlı)</div>";
  }
}

/* ================= XOX ================= */

let board, turn="X", active;

function startXOX(){
  board=["","","","","","","","",""];
  turn="X";
  active=true;
  draw();
}

function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  board.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=v;
    d.onclick=()=>move(i);
    b.appendChild(d);
  });
}

function move(i){
  if(!active || board[i]) return;

  board[i]="X";

  if(check("X")){ alert("Kazandın"); active=false; return; }

  aiMove();
  draw();
}

function aiMove(){
  let empty=board.map((v,i)=>v==""?i:null).filter(v=>v!==null);
  let i=empty[Math.floor(Math.random()*empty.length)];
  board[i]="O";

  if(check("O")){ alert("AI kazandı"); active=false; }
}

function check(p){
  const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c=>c.every(i=>board[i]==p));
}

</script>

</body>
</html>
