<script>

let board, player, ai, turn, active;

function start(choice){
  player = choice;
  ai = choice === "X" ? "O" : "X";

  board = ["","","","","","","","",""];
  turn = "X";
  active = true;

  draw();

  if(ai === "X") aiMove();
}

function draw(){
  const b = document.getElementById("board");
  b.innerHTML = "";

  board.forEach((v,i)=>{
    let d = document.createElement("div");
    d.className = "cell";
    d.innerText = v;
    d.onclick = ()=>move(i);
    b.appendChild(d);
  });

  document.getElementById("status").innerText =
    active ? "Sıra: " + turn : "Oyun bitti";
}

function move(i){
  if(!active || board[i] !== "" || turn !== player) return;

  board[i] = player;

  if(check(player)){
    end(player);
    return;
  }

  turn = ai;
  draw();

  setTimeout(aiMove, 200);
}

/* 🔥 FULL AKILLI AI */
function aiMove(){

  let bestScore = -Infinity;
  let bestMove = -1;

  for(let i=0;i<9;i++){
    if(board[i] === ""){
      board[i] = ai;
      let score = minimax(board, 0, false);
      board[i] = "";

      if(score > bestScore){
        bestScore = score;
        bestMove = i;
      }
    }
  }

  board[bestMove] = ai;

  if(check(ai)){
    end(ai);
    return;
  }

  turn = player;
  draw();
}

/* 🔥 MINIMAX (FULL AI BEYİN) */
function minimax(b, depth, isMax){

  if(check(ai)) return 10 - depth;
  if(check(player)) return depth - 10;
  if(!b.includes("")) return 0;

  if(isMax){
    let best = -Infinity;

    for(let i=0;i<9;i++){
      if(b[i] === ""){
        b[i] = ai;
        best = Math.max(best, minimax(b, depth+1, false));
        b[i] = "";
      }
    }
    return best;
  } else {
    let best = Infinity;

    for(let i=0;i<9;i++){
      if(b[i] === ""){
        b[i] = player;
        best = Math.min(best, minimax(b, depth+1, true));
        b[i] = "";
      }
    }
    return best;
  }
}

/* KAZANMA KONTROL */
function check(p){
  const w = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return w.some(c => c.every(i => board[i] === p));
}

function end(w){
  active = false;
  draw();
  document.getElementById("status").innerText = w + " kazandı!";
}

function reset(){
  start(player);
}

</script>
