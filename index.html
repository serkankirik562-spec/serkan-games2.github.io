<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

/* DARK MODE */
body.dark {
  background: #0a0a0a;
  color: white;
}

/* LIGHT MODE */
body.light {
  background: #f2f2f2;
  color: black;
}

/* ÜST BAR */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 2px solid #333;
  background: rgba(0,0,0,0.2);
}

body.light .top {
  background: #fff;
  border-bottom: 2px solid #ddd;
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: bold;
  color: #00ffcc;
}

/* SAAT */
.clock {
  font-size: 18px;
}

/* AYARLAR */
.settings {
  padding: 8px 12px;
  background: #222;
  border-radius: 10px;
  cursor: pointer;
}

body.light .settings {
  background: #ddd;
}

/* ORTA */
.center {
  margin-top: 80px;
  text-align: center;
}

h1 {
  color: #00ffcc;
}

/* SEARCH */
.search input {
  padding: 12px;
  width: 280px;
  border-radius: 10px;
  border: none;
  outline: none;
}

.search button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00ffcc;
  cursor: pointer;
}
</style>
</head>

<body class="dark">

<div class="top">
  <div class="logo">SERKAN GAMES</div>
  <div class="clock" id="clock">00:00:00</div>
  <div class="settings" onclick="toggleMode()">⚙ Tema</div>
</div>

<div class="center">
  <h1>GAMER HUB</h1>

  <div class="search">
    <input type="text" placeholder="Oyun ara...">
    <button>Ara</button>
  </div>
</div>

<script>
// SAAT
function updateClock() {
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');
  let s = String(now.getSeconds()).padStart(2,'0');

  document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();

// GÜNDÜZ / GECE
function toggleMode() {
  let body = document.body;

  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    body.classList.add("light");
  } else {
    body.classList.remove("light");
    body.classList.add("dark");
  }
}
</script>

</body>
</html>
