<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f17;color:#fff;}
.topbar{display:flex;justify-content:space-between;padding:10px;background:#151a25;}
.main{padding:10px;}
.card{background:#1c2436;margin:10px;padding:10px;border-radius:10px;}
button{background:#2a6cff;color:#fff;border:0;padding:6px;border-radius:6px;cursor:pointer;margin:3px;}
.grid{display:grid;grid-template-columns:repeat(3,60px);}
.cell{width:60px;height:60px;border:1px solid #fff;display:flex;align-items:center;justify-content:center;font-size:20px;}
.premium{background:linear-gradient(45deg,#4a7dff,#00c3ff);}
</style>

</head>
<body>

<div class="topbar">
<div>🎮 Serkan Games</div>
<div id="coinBox">💰 0</div>
</div>

<div class="main" id="main"></div>
<div id="game"></div>

<script>

// ===== USER =====
let user = JSON.parse(localStorage.getItem("user")) || {coins:0,owned:[]};

// ===== SAVE =====
function save(){
localStorage.setItem("user",JSON.stringify(user));
}

// ===== COIN =====
function addCoin(n){
user.coins+=n;
save();
updateUI();
}

function updateUI(){
coinBox.innerText="💰 "+user.coins;
}
updateUI();

// ===== GAMES =====
const mini=["XOX","Zar","Tıklama","Hedef","Tahmin"];
const premium=[{name:"Yarış",price:50},{name:"FPS",price:100},{name:"Satranç",price:150}];

// ===== MENU =====
function loadStore(){

main.innerHTML="<h2>🎲 Mini Games</h2>";

mini.forEach(g=>{
main.innerHTML+=`
<div class="card">
<h3>${g}</h3>
<button onclick="play('${g}')">▶</button>
</div>`;
});

main.innerHTML+="<h2>💎 Paralı Oyunlar</h2>";

premium.forEach(g=>{
let owned=user.owned.includes(g.name);

main.innerHTML+=`
<div class="card premium">
<h3>${g.name}</h3>
<p>${g.price} coin</p>

${owned
? `<button onclick="play('${g.name}')">▶ Oyna</button>`
: `<button onclick="buy('${g.name}',${g.price})">💰 Satın Al</button>`
}

</div>`;
});
}
loadStore();

// ===== BUY =====
function buy(name,price){

if(user.coins<price){
alert("❌ Yetersiz coin");
return;
}

user.coins-=price;
if(!user.owned.includes(name)) user.owned.push(name);

save();
updateUI();
loadStore();

alert("✔ Satın alındı: "+name);
}

// ===== PLAY =====
function play(name){

game.innerHTML=`
<div class="card">
<h2>${name}</h2>
<button onclick="game.innerHTML=''">⬅</button>
<div id="g"></div>
</div>
`;

if(name=="XOX") xox();
if(name=="Zar") zar();
if(name=="Tıklama") clicker();
if(name=="Hedef") target();
if(name=="Tahmin") guess();
if(name=="Yarış") race();
if(name=="FPS") fps();
if(name=="Satranç") chess();
}

// ===== XOX =====
function xox(){
let t="X";
g.innerHTML="<div class='grid'></div>";
let b=document.querySelector(".grid");

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.onclick=()=>{
if(!d.innerText){
d.innerText=t;
t=t=="X"?"O":"X";
addCoin(1);
}
};
b.appendChild(d);
}
}

// ===== ZAR =====
function zar(){
g.innerHTML=`<button onclick="roll()">🎲</button><div id="r"></div>`;
window.roll=()=>{
let n=Math.floor(Math.random()*6)+1;
r.innerText=n;
addCoin(n);
};
}

// ===== CLICK =====
function clicker(){
let s=0;
g.innerHTML=`<button id="b">Tıkla</button><div id="sc">0</div>`;
b.onclick=()=>{
s++;
sc.innerText=s;
if(s>=10) addCoin(10);
};
}

// ===== TARGET =====
function target(){
g.innerHTML=`<div id="t" style="width:50px;height:50px;background:red;"></div>`;
t.onclick=()=>addCoin(10);
}

// ===== GUESS =====
function guess(){
let n=Math.floor(Math.random()*5)+1;
let g1=prompt("Tahmin 1-5");
if(parseInt(g1)==n) addCoin(10);
}

// ===== RACE =====
function race(){
g.innerHTML="🏎 Oyunu oynuyorsun...";
setTimeout(()=>addCoin(20),3000);
}

// ===== FPS =====
function fps(){
g.innerHTML=`<button onclick="addCoin(5)">Vur</button>`;
}

// ===== CHESS =====
function chess(){
g.innerHTML="♟ Satranç (basit demo)";
}

</script>

</body>
</html>
