<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* ÜST GRİ BAR */
.topbar {
    background: #2b2b2b;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
}

/* BAŞLIK */
.title {
    font-size: 20px;
    font-weight: bold;
}

/* SAAT */
.clock {
    font-size: 14px;
    color: #00ffcc;
}

/* ARAMA */
.search {
    padding: 5px;
    border-radius: 5px;
    border: none;
}

/* BUTONLAR */
.buttons {
    display: flex;
    gap: 10px;
    padding: 10px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #444;
    color: white;
}

button:hover {
    background: #666;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">Serkan Games</div>
    
    <input class="search" type="text" placeholder="Ara...">

    <div class="clock" id="clock">00:00:00</div>
</div>

<div class="buttons">
    <button onclick="alert('PC Modu Açıldı')">PC</button>
    <button onclick="alert('Mobil Mod Açıldı')">Mobil</button>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
