<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#bdbdbd; /* gri */
color:#000; /* siyah yazı */
}

/* ÜST BAR */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 15px;
background:#bdbdbd;
border-bottom:2px solid #999;
}

/* SOL */
.left{
font-weight:bold;
font-size:18px;
}

/* ORTA SAAT */
.clock{
font-weight:bold;
margin-left:20px;
}

/* ARAMA */
.search{
margin-left:20px;
}

.search input{
padding:5px;
border:1px solid #666;
border-radius:5px;
outline:none;
background:#e0e0e0;
color:#000;
}

/* SAĞ AYAR */
.right{
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="top">

<!-- SOL -->
<div class="left">Serkan Games</div>

<!-- ORTA -->
<div style="display:flex;align-items:center;gap:10px;">
<div class="clock" id="clock">00:00:00</div>

<div class="search">
<input type="text" placeholder="Ara...">
</div>
</div>

<!-- SAĞ -->
<div class="right">⚙ Ayarlar</div>

</div>

<script>

// 🕒 SAAT
setInterval(()=>{
let d=new Date();
document.getElementById("clock").innerText=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
},1000);

</script>

</body>
</html>
