<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Clean Simulator L3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* TOP BAR */
#topbar{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
background:#222;
z-index:10;
}

/* GAME AREA */
#game{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CAR */
.car{
width:240px;
height:120px;
background:#c0392b;
border-radius:12px;
position:relative;
}

.part{
position:absolute;
background:#333;
}

/* JOYSTICK */
#joystickBase{
position:absolute;
bottom:20px;
left:20px;
width:100px;
height:100px;
background:#333;
border-radius:50%;
opacity:0.7;
}

#stick{
width:40px;
height:40px;
background:#777;
border-radius:50%;
position:absolute;
top:30px;
left:30px;
}

/* TOOLBAR */
#toolbar{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:10px;
}

.tool{
padding:10px;
background:#444;
border-radius:8px;
cursor:pointer;
}

/* CURSOR HAND */
#hand{
position:absolute;
width:15px;
height:15px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:20;
}

/* MESSAGE */
#msg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:15px;
display:none;
z-index:30;
}
</style>
</head>

<body>

<div id="topbar">
<div>💰 Coin: <span id="money">0</span></div>
<div>🚗 Durum: <span id="state">Kirli</span></div>
</div>

<div id="game">
<div class="car" id="car"></div>
</div>

<div id="hand"></div>

<div id="joystickBase">
<div id="stick"></div>
</div>

<div id="toolbar">
<div class="tool" onclick="selectTool('sponge')">🧽 Sünger</div>
<div class="tool" onclick="selectTool('foam')">🫧 Köpük</div>
<div class="tool" onclick="selectTool('pressure')">💦 Basınç</div>
</div>

<div id="msg"></div>

<script>

let money = 0;

/* CAR STATE */
let stage = 0; 
// 0 dirty
// 1 foam
// 2 washed
// 3 clean

let tool = null;

/* HAND POSITION */
let hx = window.innerWidth/2;
let hy = window.innerHeight/2;

const hand = document.getElementById("hand");

function showMsg(t){
let m = document.getElementById("msg");
m.innerText = t;
m.style.display="block";
setTimeout(()=>m.style.display="none",1200);
}

/* TOOL SELECT */
function selectTool(t){
tool = t;
showMsg("Seçildi: " + t);
}

/* CAR AREA */
const car = document.getElementById("car");

/* CLEANING LOGIC */
function cleanAction(){

if(stage===0 && tool!=="sponge"){
showMsg("Araba hazır değil (önce sünger)");
return;
}

if(stage===1 && tool!=="foam"){
showMsg("Araba hazır değil (köpük gerekli)");
return;
}

if(stage===2 && tool!=="pressure"){
showMsg("Araba hazır değil (basınçlı yıkama gerekli)");
return;
}

if(tool==="sponge"){
stage = Math.max(stage,1);
money += 1;
}

if(tool==="foam"){
stage = Math.max(stage,2);
money += 2;
}

if(tool==="pressure"){
stage = Math.max(stage,3);
money += 3;
}

updateState();

if(stage===3){
finishCar();
}
}

/* FINISH */
function finishCar(){
let reward = 120 + Math.floor(Math.random()*31);
money += reward;
showMsg("Araba temiz! +" + reward + " coin");
stage = 0;
updateState();
}

/* UPDATE UI */
function updateState(){
let s = "Kirli";
if(stage===1) s="Köpüklü";
if(stage===2) s="Yıkanmış";
if(stage===3) s="Temiz";

document.getElementById("state").innerText = s;
document.getElementById("money").innerText = money;
}

/* JOYSTICK */
let joyActive=false;

document.getElementById("joystickBase").addEventListener("touchmove",(e)=>{
joyActive=true;
let t = e.touches[0];
hx = t.clientX;
hy = t.clientY;

hand.style.left = hx+"px";
hand.style.top = hy+"px";

checkTouch();
});

document.getElementById("joystickBase").addEventListener("touchend",()=>{
joyActive=false;
});

/* CLICK CLEAN */
hand.addEventListener("click",()=>{
cleanAction();
});

/* AUTO INTERACTION */
function checkTouch(){
let rect = car.getBoundingClientRect();

if(hx>rect.left && hx<rect.right && hy>rect.top && hy<rect.bottom){
if(joyActive){
cleanAction();
}
}
}

updateState();

</script>

</body>
  </html>
