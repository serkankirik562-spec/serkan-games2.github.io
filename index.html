<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games V12</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

/* INTRO */
#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:100;
}

/* GAME */
canvas{
display:none;
}

/* UI */
#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
}

#shop{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:15px;
display:none;
z-index:20;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>SERKAN GAMES V12</h1>
<p>FINAL ULTIMATE ENGINE</p>
<button onclick="start()">START</button>
</div>

<div id="ui">
<button onclick="attack()">⚔ Saldır</button>
<button onclick="openShop()">Market</button>
<button onclick="toggleMode()">Mode</button>
</div>

<!-- SHOP -->
<div id="shop">
<h3>MARKET</h3>
<button onclick="buy('sword')">Kılıç (7)</button>
<button onclick="buy('bow')">Yay (20)</button>
<button onclick="buy('bomb')">Bomba (11)</button>
<button onclick="buy('mace')">Gürz (60)</button>
<button onclick="closeShop()">Kapat</button>
</div>

<canvas id="game"></canvas>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* GAME STATE */
let x=100,y=200,vx=0,vy=0;
let ground=innerHeight-120;

let coins=50;

/* MODE */
let mode="normal"; // quest / normal

/* DIFFICULTY */
let difficulty="normal";

/* WEAPONS */
let weapons={
sword:3,
bow:2,
bomb:1,
mace:1
};

let current="sword";

/* ENEMIES */
let enemies=[];

/* LEVEL RULE */
let doorLocked=true;

/* START */
function start(){
document.getElementById("intro").style.display="none";
canvas.style.display="block";
spawn();
loop();
}

/* SPAWN */
function spawn(){
enemies=[];

let count=3;

if(difficulty=="easy") count=2;
if(difficulty=="hard") count=5;
if(difficulty=="impossible") count=8;

for(let i=0;i<count;i++){
enemies.push({
x:400+i*120,
y:ground-40,
hp:1
});
}
}

/* INPUT */
document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowRight")vx=5;
if(e.key=="ArrowLeft")vx=-5;
if(e.key==" ")vy=-12;
});
document.addEventListener("keyup",()=>vx=0);

/* ATTACK + DURABILITY */
function attack(){

if(weapons[current]<=0) return;

weapons[current]--;

enemies.forEach(e=>{
if(Math.abs(e.x-x)<80){
e.hp=0;
}
});
}

/* SHOP */
function openShop(){
document.getElementById("shop").style.display="block";
}

function closeShop(){
document.getElementById("shop").style.display="none";
}

function buy(item){

let cost={
sword:7,
bow:20,
bomb:11,
mace:60
};

if(coins>=cost[item]){
coins-=cost[item];
weapons[item]+=3;
}
}

/* MODE SWITCH */
function toggleMode(){
mode = (mode=="normal") ? "quest" : "normal";
}

/* PHYSICS */
function physics(){
vy+=0.5;
x+=vx;
y+=vy;

if(y>ground){
y=ground;
vy=0;
}
}

/* UPDATE */
function update(){

let alive=enemies.filter(e=>e.hp>0).length;

/* door rule */
doorLocked = alive>0;

/* stomp */
enemies.forEach(e=>{
if(e.hp>0 && Math.abs(x-e.x)<40 && y<e.y){
e.hp=0;
}
});
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* ground */
ctx.fillStyle="#333";
ctx.fillRect(0,ground,canvas.width,200);

/* player face */
ctx.fillStyle="red";
ctx.fillRect(x,y,30,30);

/* enemies */
ctx.fillStyle="green";
enemies.forEach(e=>{
if(e.hp>0) ctx.fillRect(e.x,e.y,30,30);
});

/* door */
ctx.fillStyle=doorLocked?"red":"green";
ctx.fillRect(900,ground-100,40,100);

/* UI */
ctx.fillStyle="white";
ctx.fillText("Coins:"+coins,20,20);
ctx.fillText("Mode:"+mode,20,40);
ctx.fillText("Sword:"+weapons.sword,20,60);
}

/* LOOP */
function loop(){
physics();
update();
draw();
requestAnimationFrame(loop);
}

</script>

</body>
</html>
