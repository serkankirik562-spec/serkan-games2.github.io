<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serkan Games</title>

<style>
body{margin:0;font-family:Arial;background:#0e1117;color:#fff;}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#151a25;
flex-wrap:wrap;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
flex:1;
}

input{
padding:6px;
border-radius:6px;
border:none;
width:200px;
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#151a25;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:#2a6cff;
color:#fff;
}

.card{
display:inline-block;
width:140px;
margin:10px;
padding:10px;
background:#1c2436;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">

<div style="width:80px;"></div>

<div class="center">
<div style="font-size:20px;font-weight:bold;">🎮 Serkan Games</div>

<input type="text" placeholder="🔍 Oyun ara..." oninput="searchGames(this.value)">
</div>

<div>
<button onclick="toggleSettings()">⚙</button>
</div>

</div>

<!-- CONTENT -->
<div id="page" style="padding-bottom:60px;"></div>

<!-- BOTTOM TABS -->
<div class="tabs">
<button onclick="show('mini')">🟢 Mini</button>
<button onclick="show('board')">♟ Masa</button>
<button onclick="show('premium')">🔴 Premium</button>
</div>

<script>

// ================= USER =================
let coin=0;

function addCoin(x){
coin+=x;
console.log("💰 Coin:",coin);
}

// ================= SETTINGS =================
function toggleSettings(){
let mode=prompt("Ayarlar:\n1-PC\n2-Mobil\nSeç:");

if(mode=="1")alert("💻 PC modu seçildi");
if(mode=="2")alert("📱 Mobil modu seçildi");
}

// ================= GAMES =================

// 🟢 MINI GAMES
const miniGames=[
{name:"XOX",reward:10},
{name:"Refleks",reward:20},
{name:"Bellek",reward:15},
{name:"Sayı Tahmin",reward:25},
{name:"Renk Yakala",reward:30}
];

// ♟ MASA OYUNLARI
const boardGames=[
{name:"XOX AI",reward:10},
{name:"Dama",reward:20},
{name:"Satranç",reward:30}
];

// 🔴 PREMIUM (boş)
const premiumGames=[
{name:"Kilitsiz Oyun Yok"}
];

// ================= NAV =================
show("mini");

function show(type){

if(type=="mini")render(miniGames);
if(type=="board")render(boardGames);
if(type=="premium")render(premiumGames);
}

// ================= RENDER =================
function render(list){

let html="";

list.forEach(g=>{
html+=`
<div class="card" onclick="play('${g.name}',${g.reward})">
<h4>${g.name}</h4>
<p>💰 +${g.reward}</p>
<button>Oyna</button>
</div>
`;
});

page.innerHTML=html;
}

// ================= PLAY =================
function play(name,reward){

addCoin(reward);

alert(name+" oynandı 🎮 +"+reward+" coin");
}

// ================= SEARCH =================
function searchGames(text){

text=text.toLowerCase();

document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(text)?"inline-block":"none";
});

}

</script>

</body>
</html>
