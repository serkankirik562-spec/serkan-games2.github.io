<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background-size:cover;
    background-position:center;
    overflow:hidden;
    transition:1s ease-in-out;
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(60,60,60,0.88);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:white;
    backdrop-filter:blur(10px);
}

.logo{
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
}

.search-box input{
    width:300px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    outline:none;
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.clock{
    font-size:14px;
    text-align:right;
}

.settings{
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

.settings:hover{
    transform:rotate(90deg);
}

.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 15px black;
    text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES V2</div>

    <div class="search-box">
        <input type="text" placeholder="Oyun ara...">
    </div>

    <div class="right">
        <div class="clock" id="clock">--:--</div>
        <div class="settings">⚙️</div>
    </div>
</div>

<div class="center-text">
    SERKAN GAMES<br>GAMER PANEL
</div>

<script>
// Saat
function updateTime(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("tr-TR") + "<br>" +
        now.toLocaleDateString("tr-TR");
}
setInterval(updateTime,1000);
updateTime();


// OYUN ARKA PLANLARI (rastgele)
const backgrounds = [
    "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80", // FPS savaş
    "https://images.unsplash.com/photo-1603481546579-65d935ba6a7c?auto=format&fit=crop&w=1600&q=80", // cyber shooter
    "https://images.unsplash.com/photo-1627856015175-2c1b2d1a4b9f?auto=format&fit=crop&w=1600&q=80", // fantasy RPG
    "https://images.unsplash.com/photo-1614294148960-9aa740632a87?auto=format&fit=crop&w=1600&q=80"  // dark battle vibe
];

function changeBg(){
    const bg = backgrounds[Math.floor(Math.random()*backgrounds.length)];
    document.body.style.backgroundImage = `url('${bg}')`;
}

changeBg();
setInterval(changeBg, 7000);
</script>

</body>
</html>
