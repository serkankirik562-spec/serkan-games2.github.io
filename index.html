<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1511512578047-dfb367046420") no-repeat center center fixed;
background-size:cover;
color:white;
overflow:hidden;
}

/* TOP BAR */
#topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(0,0,0,0.7);
}

#title{
font-size:20px;
font-weight:bold;
}

#search{
padding:5px;
width:150px;
}

/* MENU */
#menu{
display:flex;
gap:20px;
padding:20px;
}

.card{
width:200px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* GAME */
canvas{
display:none;
background:rgba(135,206,235,0.8);
margin:auto;
}

#settings{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:10px;
width:300px;
}

button{margin:5px;padding:8px;}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
<div id="title">SERKAN GAMES</div>

<div id="time"></div>

<input id="search" placeholder="Ara...">

<button onclick="openSettings()">Ayarlar</button>
</div>

<!-- MENU -->
<div id="menu">
<div class="card" onclick="startGame()">🕷 Spider Swing</div>
<div class="card">🎮 Windclash</div>
</div>

<!-- GAME -->
<canvas id="game" width="900" height="450"></canvas>

<!-- SETTINGS -->
<div id="settings">
<h3>Ayarlar</h3>

<button onclick="toggleSound()">Ses Aç/Kapat</button>
<button onclick="toggleMusic()">Müzik Aç/Kapat</button>
<button onclick="toggleVibration()">Titreşim Aç/Kapat</button>
<button onclick="pauseGame()">Durdur</button>
<button onclick="resumeGame()">Devam</button>

<br>
<button onclick="closeSettings()">Kapat</button>
</div>

<script>

/* TIME */
setInterval(()=>{
document.getElementById("time").innerHTML =
new Date().toLocaleString();
},1000);

/* SETTINGS */
let sound=true,music=true,vibration=true;
let paused=false;

/* GAME */
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let x=50,y=300,vx=0,vy=0;
let ground=350;
let finishX=800;
let coins=0;

let swingZones=[200,400,600]; // SADECE BU NOKTALARDA SALINMA
let swinging=false;

/* START */
function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
loop();
}

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowRight") vx=3;
if(e.key=="ArrowLeft") vx=-3;
if(e.key==" "){
vy=-8; // jump
}
});

document.addEventListener("keyup",()=>vx=0);

/* TOUCH */
let lastTap=0;

document.addEventListener("touchstart",()=>{
let now=Date.now();

if(now-lastTap<300){
vy=-9; // double jump
}else{
vx=2; // hold move
}
lastTap=now;
});

document.addEventListener("touchend",()=>vx=0);

/* LOOP */
function loop(){

if(paused) return;

ctx.clearRect(0,0,900,450);

/* gravity */
vy+=0.3;
y+=vy;
x+=vx;

/* ground */
if(y>ground){ y=ground; vy=0; }

/* swing zones */
swinging = swingZones.includes(Math.floor(x));

if(swinging){
ctx.strokeStyle="brown";
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x+40,y-80);
ctx.stroke();

if(vy>-2) vy=-3; // hafif sallanma
}

/* spikes */
ctx.fillStyle="black";
for(let i=250;i<800;i+=100){
ctx.fillRect(i,370,30,30);
}

/* coins */
ctx.fillStyle="gold";
ctx.fillRect(500,320,10,10);

/* finish */
ctx.fillStyle="green";
ctx.fillRect(finishX,280,20,120);

/* player */
ctx.fillStyle="red";
ctx.fillRect(x,y-20,20,20);

/* finish check */
if(x>finishX){
alert("BÖLÜM BİTTİ ⭐");
finishX+=300;
}

/* pause check */
requestAnimationFrame(loop);
}

/* SETTINGS */
function openSettings(){
document.getElementById("settings").style.display="block";
}

function closeSettings(){
document.getElementById("settings").style.display="none";
}

function toggleSound(){sound=!sound;}
function toggleMusic(){music=!music;}
function toggleVibration(){vibration=!vibration;}

function pauseGame(){paused=true;}
function resumeGame(){paused=false; loop();}

</script>

</body>
</html>
