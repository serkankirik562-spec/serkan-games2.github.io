<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Serkan Games - Kuaför Tycoon</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* STEAM CARD */
.card{
  width:320px;
  margin:40px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 15px black;
}

input{
  padding:10px;
  width:90%;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-size:16px;
}

/* GAME */
.game{
  display:none;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:10px;
  align-items:center;
}

.shop{
  margin-top:15px;
  background:#222;
  padding:10px;
  border-radius:10px;
}

.box{
  margin-top:20px;
  background:#222;
  padding:15px;
  border-radius:10px;
}

.bar{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}

.cut{
  padding:10px;
  background:#444;
  border-radius:8px;
  cursor:pointer;
}

.cut:hover{
  background:#00c853;
}
</style>

</head>

<body>

<!-- STEAM START -->
<div class="card" id="startCard">
<h2>💇 Kuaför Tycoon</h2>
<p>Kuaför adını gir</p>

<input id="name" placeholder="Kuaför adı...">

<button onclick="startGame()">Başlat</button>
</div>

<!-- GAME -->
<div class="game" id="game">

<div class="topbar">
  <div id="barberName">Kuaför</div>
  <div>💵 <span id="money">0</span></div>
  <div>📅 Gün <span id="day">1</span></div>
</div>

<!-- SHOP -->
<div class="shop">
<h3>🛒 Mağaza</h3>
<button onclick="buy('zemin')">Zemin (50$)</button>
<button onclick="buy('duvar')">Duvar (50$)</button>
<button onclick="buy('koltuk')">Koltuk (100$)</button>
</div>

<!-- CUSTOMER -->
<div class="box">
<h3>👤 Müşteri</h3>
<p id="customer">Hazır...</p>

<div class="bar">
  <div class="cut" onclick="cut('yan')">Yan</div>
  <div class="cut" onclick="cut('ust')">Üst</div>
  <div class="cut" onclick="cut('arka')">Arka</div>
</div>

<p id="msg"></p>
</div>

</div>

<script>

let money = 0;
let day = 1;
let target = "";

function startGame(){
  let name = document.getElementById("name").value;
  if(!name) name = "Kuaför";

  document.getElementById("barberName").innerText = name;

  document.getElementById("startCard").style.display="none";
  document.getElementById("game").style.display="block";

  newCustomer();
  setInterval(nextDay, 15000); // 15 sn = 1 gün
}

function nextDay(){
  day++;
  document.getElementById("day").innerText = day;
  money += 20;
  document.getElementById("money").innerText = money;
}

function newCustomer(){
  const parts = ["yan","ust","arka"];
  target = parts[Math.floor(Math.random()*parts.length)];
  document.getElementById("customer").innerText =
  "İstediği: " + target;
}

function cut(part){
  if(part === target){
    money += 30;
    document.getElementById("msg").innerText = "✔ Doğru! +30$";
  }else{
    money -= 10;
    document.getElementById("msg").innerText = "❌ Yanlış! -10$";
  }

  document.getElementById("money").innerText = money;
  setTimeout(newCustomer, 1000);
}

/* SHOP */
function buy(item){
  let price = 0;

  if(item=="zemin") price=50;
  if(item=="duvar") price=50;
  if(item=="koltuk") price=100;

  if(money >= price){
    money -= price;
    document.getElementById("msg").innerText =
    "✔ Satın alındı: " + item;
  }else{
    document.getElementById("msg").innerText =
    "❌ Para yok!";
  }

  document.getElementById("money").innerText = money;
}

</script>

</body>
</html>
