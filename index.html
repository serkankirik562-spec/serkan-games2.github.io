<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #111827;
      border-bottom: 2px solid #00ffcc;
    }

    .logo {
      font-weight: bold;
      color: #00ffcc;
      letter-spacing: 2px;
    }

    .search input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      border-radius: 8px;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="logo">SERKAN GAMES</div>

    <div class="search">
      <input type="text" placeholder="Ara...">
    </div>

    <div class="box" id="datetime">--</div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="card">
      <h3>🎮 Serkan Games</h3>
      <p id="holiday">Yükleniyor...</p>
    </div>

    <!-- OYUNLAR KALDIRILDI -->

  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    function detectHoliday() {
      const now = new Date();
      const d = now.getDate();
      const m = now.getMonth() + 1;

      if (m === 1 && d === 1) {
        document.getElementById("holiday").innerText = "🎉 Yeni Yıl";
      }
      else if (m === 4 && d === 23) {
        document.getElementById("holiday").innerText = "🇹🇷 23 Nisan";
      }
      else if (m === 5 && d === 19) {
        document.getElementById("holiday").innerText = "🇹🇷 19 Mayıs";
      }
      else if (m === 10 && d === 29) {
        document.getElementById("holiday").innerText = "🇹🇷 29 Ekim";
      }
    }

    detectHoliday();
  </script>

</body>
</html>
