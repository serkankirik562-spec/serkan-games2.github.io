<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Serkan Games - Gamer Panel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      padding: 15px 20px;
      border-bottom: 2px solid #00ffcc;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    .menu a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #00ffcc;
    }

    /* PANEL */
    .panel {
      padding: 30px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      border: 1px solid #00ffcc33;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">🎮 Serkan Games</div>
    <div class="menu">
      <a href="#">Ana Sayfa</a>
      <a href="#">Oyunlar</a>
      <a href="#">Gamer Panel</a>
      <a href="#">İletişim</a>
    </div>
  </div>

  <div class="panel">
    <h1>Gamer Panel</h1>

    <div class="card">
      🎯 Durum: Aktif oyuncu
    </div>

    <div class="card">
      🕹 Son oynanan: Minecraft
    </div>

    <div class="card">
      🏆 Seviye: 5
    </div>
  </div>

</body>
</html>
