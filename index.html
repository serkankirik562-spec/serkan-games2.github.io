<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    overflow:hidden;
    transition:0.4s;
}

/* DARK */
.dark{
    background: radial-gradient(circle at top,#111,#000 80%);
    color:white;
}

/* LIGHT */
.light{
    background: radial-gradient(circle at top,#ffffff,#1a1a1a 80%);
    color:white;
}

/* ARKA PLAN */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:25px 25px;
    z-index:-1;
}

/* ÜST BAR */
.navbar{
    width:100%;
    height:65px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    position:fixed;
    top:0;
    left:0;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 15px white;
}

.nav-center{
    display:flex;
    align-items:center;
    gap:10px;
}

.clock{
    font-size:14px;
}

.date{
    font-size:13px;
    opacity:0.8;
}

.search{
    width:160px;
    height:35px;
    border:none;
    border-radius:10px;
    padding-left:10px;
    background:#1f1f1f;
    color:white;
    outline:none;
}

.settings-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* AYAR PANEL */
.settings{
    position:fixed;
    top:80px;
    right:20px;
    width:220px;
    background:#111;
    border-radius:15px;
    padding:20px;
    display:none;
}

.settings.active{
    display:block;
}

.close{
    color:red;
    cursor:pointer;
}

.theme-btn{
    margin-top:10px;
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

/* ORTA */
.center{
    height:calc(100vh - 65px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    margin-top:65px;
}

.title{
    opacity:0;
    transform:translateY(40px);
    animation:slideUp 1s ease forwards;
    font-size:45px;
    color:white;
    text-shadow:0 0 20px white;
}

@keyframes slideUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body class="dark">

<div class="bg"></div>

<!-- ÜST BAR -->
<div class="navbar">

    <div class="logo">SERKAN GAMES</div>

    <div class="nav-center">

        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date">00/00/0000</div>

        <input class="search" placeholder="Ara...">

    </div>

    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

</div>

<!-- AYAR -->
<div class="settings" id="settings">

    <div class="close" onclick="toggleSettings()">✖</div>

    <button class="theme-btn" onclick="toggleTheme()">
        Night / Light
    </button>

</div>

<!-- ORTA -->
<div class="center">
    <h1 class="title">SERKAN GAMES<br>HOŞGELDİNİZ</h1>
</div>

<script>

/* SAAT + TARİH */
function updateTime(){

    let now = new Date();

    let h = String(now.getHours()).padStart(2,"0");
    let m = String(now.getMinutes()).padStart(2,"0");
    let s = String(now.getSeconds()).padStart(2,"0");

    let d = String(now.getDate()).padStart(2,"0");
    let mo = String(now.getMonth()+1).padStart(2,"0");
    let y = now.getFullYear();

    document.getElementById("clock").innerHTML = h+":"+m+":"+s;
    document.getElementById("date").innerHTML = d+"/"+mo+"/"+y;
}

setInterval(updateTime,1000);
updateTime();

/* AYAR */
function toggleSettings(){
    document.getElementById("settings").classList.toggle("active");
}

/* TEMA */
function toggleTheme(){
    document.body.classList.toggle("light");
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
