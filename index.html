<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{margin:0;font-family:Arial;background:#0e1117;color:#fff}

/* TOP BAR (DEĞİŞMEDİ) */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#151a25;
flex-wrap:wrap;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
flex:1;
}

input{
padding:6px;
border-radius:6px;
border:none;
width:200px;
}

/* ALT PANEL */
.panel{
padding:10px;
text-align:center;
}

.tabs{
display:flex;
justify-content:center;
gap:5px;
margin:10px 0;
}

button{
padding:6px;
border:0;
border-radius:6px;
background:#2a6cff;
color:#fff;
cursor:pointer;
}

.card{
display:inline-block;
width:140px;
margin:10px;
padding:10px;
background:#1c2436;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">

<div style="width:80px;"></div>

<div class="center">
<div style="font-size:20px;font-weight:bold;">🎮 Serkan Games</div>

<input type="text" placeholder="🔍 Oyun ara..." oninput="searchGames(this.value)">
</div>

<div>
<button onclick="toggleSettings()">⚙</button>
</div>

</div>

<!-- COIN -->
<div class="panel">
💰 Coin: <span id="coin">0</span>
</div>

<!-- TABS -->
<div class="tabs">
<button onclick="show('mini')">🟢 Mini</button>
<button onclick="show('board')">♟ Masa</button>
<button onclick="show('premium')">🔴 Premium</button>
</div>

<!-- CONTENT -->
<div id="page" class="panel"></div>

<script>

// ================= COIN =================
let coin=0;

function addCoin(x){
coin+=x;
document.getElementById("coin").innerText=coin;
}

// ================= AYAR =================
function toggleSettings(){
let m=prompt("Ayarlar:\n1-PC\n2-Mobil");

if(m=="1")alert("💻 PC modu");
if(m=="2")alert("📱 Mobil modu");
}

// ================= OYUNLAR =================

const miniGames=[
{name:"XOX",reward:10},
{name:"Refleks",reward:20},
{name:"Bellek",reward:15},
{name:"Sayı Tahmin",reward:25},
{name:"Renk Yakala",reward:30},
{name:"Taş Kağıt",reward:10}
];

const boardGames=[
{name:"XOX AI",reward:10},
{name:"Dama",reward:20},
{name:"Satranç",reward:30}
];

const premiumGames=[
{name:"Minecraft Style",locked:true},
{name:"FPS Demo",locked:true},
{name:"Car Racing 3D",locked:true}
];

// ================= NAV =================
show("mini");

function show(type){

let list=[];

if(type=="mini")list=miniGames;
if(type=="board")list=boardGames;
if(type=="premium")list=premiumGames;

let html="";

list.forEach(g=>{

html+=`
<div class="card">
<h4>${g.name}</h4>
<p>💰 +${g.reward||0}</p>
<button onclick="play('${g.name}',${g.reward||0},${g.locked||false})">
Oyna
</button>
</div>
`;

});

page.innerHTML=html;
}

// ================= OYUN =================
function play(name,reward,locked){

if(locked){
alert("🔒 Premium oyun");
return;
}

addCoin(reward);
alert(name+" oynandı +"+reward+" coin");
}

// ================= SEARCH =================
function searchGames(t){

t=t.toLowerCase();

document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(t)?"inline-block":"none";
});

}

</script>

</body>
</html>
