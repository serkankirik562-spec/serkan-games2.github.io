<!-- OYUN MAĞAZA -->
<div style="padding:20px;">

<h2>🎮 Oyunlar</h2>

<div style="display:flex;gap:20px;flex-wrap:wrap;">

    <!-- OYUN KART -->
    <div style="width:200px;background:#222;color:white;padding:15px;border-radius:10px;">
        <h3>Dövüş Oyunu</h3>
        <p>Online & AI</p>

        <button onclick="openGame()">▶️ Oyna</button>
        <button>⬇️ İndir</button>
    </div>

</div>
</div>

<!-- OYUN PANEL -->
<div id="gamePanel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;color:white;z-index:999;">

    <!-- ÜST BAR -->
    <div style="padding:10px;background:#222;">
        <button onclick="closeGame()">⬅ Geri</button>
    </div>

    <!-- MENÜ -->
    <div id="menu1" style="text-align:center;margin-top:80px;">
        <h2>Serkan Fight</h2>
        <input id="name" placeholder="İsim"><br><br>

        <select id="char">
            <option value="red">Kırmızı</option>
            <option value="blue">Mavi</option>
        </select><br><br>

        <button onclick="nextMenu()">Başla</button>
    </div>

    <!-- MOD -->
    <div id="menu2" style="display:none;text-align:center;margin-top:80px;">
        <button onclick="startOnline()">👥 Arkadaşla</button>
        <button onclick="startAI()">🤖 AI</button>
    </div>

    <!-- OYUN -->
    <canvas id="game"></canvas>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

let socket, players={}, myId;
let aiMode=false;

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// AÇ/KAPAT
function openGame(){
    document.getElementById("gamePanel").style.display="block";
}

function closeGame(){
    document.getElementById("gamePanel").style.display="none";
}

// MENÜ
function nextMenu(){
    document.getElementById("menu1").style.display="none";
    document.getElementById("menu2").style.display="block";
}

// ONLINE
function startOnline(){
    aiMode=false;
    canvas.style.display="block";

    socket=io();

    let name=document.getElementById("name").value;
    let color=document.getElementById("char").value;

    socket.on("myId", id=>myId=id);
    socket.on("players", data=>players=data);

    socket.emit("join",{name,color});

    loop();
}

// AI
let ai={x:500,y:200,hp:100};

function startAI(){
    aiMode=true;
    canvas.style.display="block";
    loop();
}

// PLAYER
let player={x:100,y:200,hp:100};

// KONTROL
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// SALDIRI
function attack(){
    if(aiMode){
        if(Math.abs(player.x-ai.x)<100){
            ai.hp -= 10;
        }
    }else{
        socket.emit("attack");
    }
}

// MOUSE
document.onmousedown=(e)=>{
    if(e.button===0) attack();
};
document.oncontextmenu=e=>e.preventDefault();

// LOOP
function loop(){

    function update(){
        if(keys["a"]) player.x-=5;
        if(keys["d"]) player.x+=5;

        if(!aiMode){
            socket.emit("move",player);
        }else{
            if(ai.x>player.x) ai.x-=2;
            if(ai.x<player.x) ai.x+=2;
        }
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="red";
        ctx.fillRect(player.x,player.y,60,60);

        if(aiMode){
            ctx.fillStyle="blue";
            ctx.fillRect(ai.x,ai.y,60,60);
        }else{
            for(let id in players){
                let p=players[id];
                ctx.fillStyle=p.color;
                ctx.fillRect(p.x,p.y,60,60);
            }
        }
    }

    function gameLoop(){
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
}

</script>
