<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* ÜST BAR */
header{
  background:#6b7280;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SOL LOGO + YAZI */
.left{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

/* YUVARLAK LOGO */
.logo{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid gold;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SAAT */
#clock{
  font-size:13px;
}

/* ARAMA */
#search{
  padding:7px;
  border-radius:8px;
  border:none;
  width:160px;
}
</style>
</head>

<body>

<header>

  <div class="left">
    <div class="logo">
      <img src="/mnt/data/a_clean_modern_website_app_ui_screenshot_or_wallp.png">
    </div>
    <div>SERKAN GAMES</div>
  </div>

  <input id="search" placeholder="Oyun ara...">

  <div id="clock"></div>

</header>

<script>
function clock(){
  const d = new Date();
  document.getElementById("clock").innerText = d.toLocaleTimeString();
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
