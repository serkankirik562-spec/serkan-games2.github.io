<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#333;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:#1b1b1b;
}

.menu button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

/* GAME BOX */
.game-box{
  width:320px;
  margin:auto;
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* XOX */
#board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

.cell{
  width:80px;
  height:80px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}

/* MEMORY */
.card{
  width:60px;
  height:60px;
  background:#222;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:5px;
  cursor:pointer;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>🎮 Serkan Games</div>
  <div>Ayar</div>
</div>

<div class="menu">
  <button onclick="show('home')">🏠 Ana</button>
  <button onclick="show('xoxMenu')">❌⭕ XOX</button>
  <button onclick="show('memoryMenu')">🧠 Hafıza</button>
  <button onclick="show('diceMenu')">🎲 Zar</button>
</div>

<!-- HOME -->
<div id="home" class="page" style="display:block;">
  <h2>Mini Oyun Platformu 🎮</h2>
</div>

<!-- XOX MENU -->
<div id="xoxMenu" class="page">
  <h2>XOX Oyunu</h2>
  <button onclick="startXOX()">▶ Oyna</button>
</div>

<!-- MEMORY MENU -->
<div id="memoryMenu" class="page">
  <h2>Hafıza Oyunu</h2>
  <button onclick="startMemory()">▶ Oyna</button>
</div>

<!-- DICE MENU -->
<div id="diceMenu" class="page">
  <h2>Zar Oyunu</h2>
  <button onclick="startDice()">▶ Oyna</button>
</div>

<!-- GAME AREA -->
<div id="game" class="page">
  <button onclick="back()">← Geri</button>
  <div id="gameArea"></div>
</div>

<script>

/* PAGE SYSTEM */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function back(){
  show("home");
}

/* ================= XOX ================= */
let board, player="X", ai="O", turn, active;

function startXOX(){
  show("game");

  board=["","","","","","","","",""];
  turn="X";
  active=true;

  drawXOX();
}

function drawXOX(){
  let area=document.getElementById("gameArea");
  area.innerHTML=`<div class="game-box"><div id="board"></div></div>`;

  let b=document.getElementById("board");
  b.innerHTML="";

  board.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=v;
    d.onclick=()=>move(i);
    b.appendChild(d);
  });
}

function move(i){
  if(!active || board[i]) return;
  if(turn!="X") return;

  board[i]="X";

  if(check("X")){ alert("Kazandın"); active=false; return; }

  turn="O";
  drawXOX();

  setTimeout(aiMove,300);
}

function aiMove(){
  let empty=board.map((v,i)=>v==""?i:null).filter(v=>v!==null);
  let i=empty[Math.floor(Math.random()*empty.length)];

  board[i]="O";

  if(check("O")){ alert("AI kazandı"); active=false; return; }

  turn="X";
  drawXOX();
}

function check(p){
  const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c=>c.every(i=>board[i]==p));
}

/* ================= MEMORY ================= */
let mem=[], first=null, lock=false;

function startMemory(){
  show("game");

  let items=["🚗","🚀","🐶"];
  mem=[...items,...items];

  mem.sort(()=>Math.random()-0.5);

  let area=document.getElementById("gameArea");
  area.innerHTML=`<div class="game-box" id="memBox"></div>`;

  let box=document.getElementById("memBox");
  box.innerHTML="";

  mem.forEach((e,i)=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerText="?";
    d.onclick=()=>flip(d,e);
    box.appendChild(d);
  });
}

function flip(card,val){
  if(lock || card.innerText!="?") return;

  card.innerText=val;

  if(!first){
    first={card,val};
  } else {
    lock=true;

    if(first.val==val){
      first=null;
      lock=false;
    } else {
      setTimeout(()=>{
        card.innerText="?";
        first.card.innerText="?";
        first=null;
        lock=false;
      },600);
    }
  }
}

/* ================= DICE ================= */
let score=0;

function startDice(){
  show("game");

  let area=document.getElementById("gameArea");

  area.innerHTML=`
    <div class="game-box">
      <h2>🎲 Zar</h2>
      <button onclick="roll()">At</button>
      <p id="diceOut">Skor: 0</p>
    </div>
  `;
}

function roll(){
  let r=Math.floor(Math.random()*6)+1;
  score+=r;
  document.getElementById("diceOut").innerText="Skor: "+score;
}

</script>

</body>
</html>
