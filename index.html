<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Serkan Games</title>
</head>

<body id="body" style="margin:0; background:#0a0a0a; color:#00ffcc; font-family:Arial;">

<!-- ÜST BAR -->
<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #00ffcc33;">
  <div>🎮 SERKAN GAMES</div>
  <div id="clock">00:00:00</div>
</div>

<!-- MESAJ -->
<div style="text-align:center; margin-top:60px;">
  <h1 id="msg">Yükleniyor...</h1>
</div>

<script>

// SAAT
function clock(){
  let d=new Date();
  document.getElementById("clock").innerText =
  String(d.getHours()).padStart(2,'0')+":"+
  String(d.getMinutes()).padStart(2,'0')+":"+
  String(d.getSeconds()).padStart(2,'0');
}
setInterval(clock,1000);
clock();


// TEK ÖZEL GÜN SİSTEMİ (ÇAKIŞMASIZ)
function special(){

  const d = new Date();
  const m = d.getMonth()+1;
  const day = d.getDate();

  let text = "";

  switch(true){

    case (m==1 && day==1):
      text="🎆 Yılbaşı Kutlu Olsun!";
      break;

    case (m==2 && day==14):
      text="❤️ Sevgililer Günü!";
      break;

    case (m==4 && day==23):
      text="🇹🇷 23 Nisan!";
      break;

    case (m==5 && day==19):
      text="🔥 19 Mayıs!";
      break;

    case (m==8 && day==30):
      text="🇹🇷 Zafer Bayramı!";
      break;

    case (m==10 && day==29):
      text="🇹🇷 Cumhuriyet Bayramı!";
      break;

    case (m==11 && day==10):
      text="🖤 10 Kasım";
      break;

    default:
      text="🎮 Özel Gün Yok (Normal Gün)";
  }

  document.getElementById("msg").innerText = text;
}

setInterval(special,1000);
special();

</script>

</body>
</html>
