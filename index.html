<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Serkan Games</title>
</head>

<body style="margin:0; background:#121212; color:white; font-family:Arial;">

  <div style="text-align:center; padding:40px;">
    <h1>🎮 Serkan Games</h1>
    <p>Siteye hoş geldin</p>
  </div>

  <div style="max-width:500px; margin:auto; padding:20px;">

    <h2>🚀 Oyunlar</h2>

    <div style="border:1px solid #333; padding:15px; border-radius:10px; margin-bottom:10px; background:#1e1e1e;">
      <h3>🚗 Araba Tamir Simülasyonu</h3>
      <p>Basit para kazanma oyunu</p>
      <button onclick="paraArtir()" style="padding:10px;">Oyna</button>
      <p>Para: <span id="para">0</span> TL</p>
    </div>

    <div style="border:1px solid #333; padding:15px; border-radius:10px; background:#1e1e1e;">
      <h3>🔩 Nalbur Simülasyonu</h3>
      <button onclick="stokArtir()" style="padding:10px;">Oyna</button>
      <p>Stok: <span id="stok">0</span></p>
    </div>

  </div>

<script>
let para = 0;
let stok = 0;

function paraArtir() {
  para += 10;
  document.getElementById("para").innerText = para;
}

function stokArtir() {
  stok += 1;
  document.getElementById("stok").innerText = stok;
}
</script>

</body>
</html>
