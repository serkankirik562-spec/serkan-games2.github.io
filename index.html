<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* 🎮 GAMER ARKA PLAN */
body {
  background: radial-gradient(circle at top, #1e3a8a, #0f172a, #000);
}

/* ⚡ ANİMASYONLU NOKTALAR */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: float 6s infinite linear;
  opacity: 0.7;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* ÜST BAR */
header {
  background: rgba(255, 215, 0, 0.9);
  color: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  position: relative;
  z-index: 10;
  backdrop-filter: blur(5px);
}

/* ARAMA */
#search {
  padding: 8px;
  border-radius: 8px;
  border: none;
  width: 180px;
}

/* SAAT */
#clock {
  font-size: 14px;
}

/* AYARLAR */
#settings {
  display: none;
  background: #1e293b;
  padding: 10px;
  position: absolute;
  right: 10px;
  top: 60px;
  border-radius: 10px;
  z-index: 20;
}

/* ÖZEL GÜN */
#ozel-gun {
  text-align: center;
  font-weight: bold;
  padding: 10px;
}

/* ANA İÇERİK */
.content {
  padding: 20px;
  position: relative;
  z-index: 10;
}
</style>
</head>

<body>

<header>
  <div>🎮 SERKAN GAMES</div>

  <input id="search" placeholder="Oyun ara...">

  <div id="clock"></div>

  <button onclick="toggleSettings()">⚙️</button>

  <!-- AYARLAR -->
  <div id="settings">
    <p>⚙️ Ayarlar</p>
    <button onclick="alert('Tema yakında!')">🎨 Tema</button>
    <button onclick="alert('Ses yakında!')">🔊 Ses</button>
  </div>
</header>

<!-- ÖZEL GÜN -->
<div id="ozel-gun"></div>

<!-- İÇERİK -->
<div class="content">
  <h2>Hoşgeldin Serkan 👋</h2>
  <p>Gamer site hazır ⚡</p>
</div>

<script>

/* ================= SAAT ================= */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

/* ================= AYARLAR ================= */
function toggleSettings() {
  const panel = document.getElementById("settings");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

/* ================= ÖZEL GÜNLER ================= */
const bugun = new Date();

const ozelGunler = [
  { ad: "🎆 Yeni Yıl", bas: "2026-01-01", bit: "2026-01-01" },
  { ad: "🕌 Ramazan Bayramı", bas: "2026-03-20", bit: "2026-03-22" },
  { ad: "👧 23 Nisan Ulusal Egemenlik ve Çocuk Bayramı", bas: "2026-04-23", bit: "2026-04-23" },
  { ad: "🧑‍💼 1 Mayıs Emek ve Dayanışma Günü", bas: "2026-05-01", bit: "2026-05-01" },
  { ad: "🇹🇷 19 Mayıs Atatürk’ü Anma Gençlik ve Spor Bayramı", bas: "2026-05-19", bit: "2026-05-19" },
  { ad: "🐑 Kurban Bayramı", bas: "2026-05-26", bit: "2026-05-30" },
  { ad: "🛡️ 15 Temmuz Demokrasi ve Milli Birlik Günü", bas: "2026-07-15", bit: "2026-07-15" },
  { ad: "🇹🇷 30 Ağustos Zafer Bayramı", bas: "2026-08-30", bit: "2026-08-30" },
  { ad: "🇹🇷 29 Ekim Cumhuriyet Bayramı", bas: "2026-10-29", bit: "2026-10-29" }
];

let aktif = null;

for (let g of ozelGunler) {
  const bas = new Date(g.bas);
  const bit = new Date(g.bit);

  if (bugun >= bas && bugun <= bit) {
    aktif = g;
    break;
  }
}

const alan = document.getElementById("ozel-gun");

if (aktif) {
  alan.innerHTML = `🎉 ${aktif.ad} (${aktif.bas} - ${aktif.bit})`;
  alan.style.background = "gold";
  alan.style.color = "black";
} else {
  alan.style.display = "none";
}

/* ================= PARTICLE OLUŞTUR ================= */
for (let i = 0; i < 30; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
