<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* ÜST BAR */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:#bdbdbd;
color:#000;
border-bottom:2px solid #999;
}

/* SOL BAŞLIK */
.title{
font-size:22px;
font-weight:bold;
color:#fff;
}

/* ORTA SAAT */
.clock{
font-weight:bold;
font-size:16px;
margin:0 15px;
}

/* ARAMA */
.search input{
padding:5px;
border-radius:6px;
border:1px solid #666;
outline:none;
background:#eee;
}

/* AYARLAR */
.settings{
cursor:pointer;
font-weight:bold;
}

/* PC MOD */
.pc-mode{
max-width:1200px;
margin:auto;
}

/* MOBİL NORMAL */
.mobile-mode{
max-width:100%;
}
</style>

<div class="top">
  <div class="title">SERKAN GAMES</div>

  <div class="clock" id="clock">00:00:00</div>

  <div class="search">
    <input type="text" placeholder="Ara...">
  </div>

  <div class="settings" onclick="toggleSettings()">⚙ Ayarlar</div>
</div>

<script>

// 🕒 SAAT
setInterval(()=>{
let d=new Date();
document.getElementById("clock").innerText=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
},1000);

// ⚙ AYAR MENÜ
function toggleSettings(){

let mode=confirm("PC modu aç? (İptal = Mobil)");

if(mode){
document.body.classList.add("pc-mode");
document.body.classList.remove("mobile-mode");
}else{
document.body.classList.add("mobile-mode");
document.body.classList.remove("pc-mode");
}
}

</script>
