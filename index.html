<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    overflow:hidden;
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(60,60,60,0.88);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:white;
    backdrop-filter:blur(10px);
}

.logo{
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
}

.search-box input{
    width:300px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    outline:none;
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.clock{
    font-size:14px;
    text-align:right;
}

.settings{
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

.settings:hover{
    transform:rotate(90deg);
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search-box">
        <input type="text" placeholder="Oyun ara...">
    </div>

    <div class="right">
        <div class="clock" id="clock">--:--</div>
        <div class="settings">⚙️</div>
    </div>
</div>

<script>
function updateTime(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("tr-TR") + "<br>" +
        now.toLocaleDateString("tr-TR");
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
