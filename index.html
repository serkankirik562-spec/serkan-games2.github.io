<h1>Serkan Games</h1>
<!DOCTYPE html>
<html>
<head>
    <title>Serkan Games</title>
</head>
<body style="margin:0; background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">

<h1>Serkan Games</h1>

<input type="text" id="search" placeholder="Ara..." 
style="padding:12px; width:260px; font-size:16px; border-radius:8px; border:none; outline:none;">

<button onclick="ara()" style="padding:10px 20px; margin-top:10px; border-radius:8px; border:none; cursor:pointer;">
Ara
</button>

<p id="sonuc" style="margin-top:15px;"></p>

<script>
function ara(){
    let text = document.getElementById("search").value;
    document.getElementById("sonuc").innerText = "Aradın: " + text;
}
</script>

</body>
</html>
