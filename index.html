<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: white;
}

/* ÜST BAR */
.header {
    background: #666;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
}

/* SOL LOGO */
.logo {
    font-size: 22px;
    font-weight: bold;
}

/* ARAMA */
.search input {
    padding: 7px;
    border: none;
    border-radius: 6px;
    outline: none;
}

/* ALT ALAN */
.content {
    background: white;
    padding: 20px;
}

/* OYUN LİSTESİ */
.games-title {
    font-size: 20px;
    margin-bottom: 10px;
}

/* OYUN KARTI */
.game-card {
    width: 220px;
    background: #f2f2f2;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.play-btn {
    margin-top: 10px;
    padding: 8px;
    background: #666;
    color: white;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- ÜST BAR -->
<div class="header">
    <div class="logo">Serkan Games</div>

    <div class="search">
        <input type="text" placeholder="Arama...">
    </div>
</div>

<!-- ALT ALAN -->
<div class="content">

    <div class="games-title">Oyunlar</div>

    <!-- SENİN OYUNUN -->
    <div class="game-card">
        🕷 Örümcek Oyunu<br>
        <small>Serkan tarafından tasarlandı</small>

        <div class="play-btn">Oyna</div>
    </div>

</div>

</body>
</html>
