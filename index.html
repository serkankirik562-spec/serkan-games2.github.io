<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #000;
  padding: 10px 15px;
}

.center input {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

/* SAYFALAR */
.page { display: none; padding: 20px; }

/* XOX */
#board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 90px;
  height: 90px;
  background: #222;
  font-size: 35px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  cursor:pointer;
}

.cell:hover { background:#333; }

button {
  margin: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🎮 Serkan Games</div>
  <div><input placeholder="Ara..."></div>
  <div><button onclick="show('home')">Ayar</button></div>
</div>

<!-- ANA SAYFA -->
<div id="home" class="page" style="display:block;">

  <h2>❌⭕ XOX AI Oyunu</h2>

  <p>Önce taraf seç:</p>

  <button onclick="startGame('X')">Ben X olayım</button>
  <button onclick="startGame('O')">Ben O olayım</button>

</div>

<!-- OYUN -->
<div id="game" class="page">

  <h2>XOX Yapay Zeka</h2>

  <div id="board"></div>
  <p id="status"></p>

  <button onclick="reset()">Reset</button>
  <button onclick="show('home')">Ana Sayfa</button>

</div>

<script>

let board = ["","","","","","","","",""];
let player = "X";
let ai = "O";
let turn = "X";
let active = false;

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function startGame(choice){
  player = choice;
  ai = choice === "X" ? "O" : "X";
  turn = "X";
  active = true;
  board = ["","","","","","","","",""];
  show("game");
  draw();

  if(ai === "X") aiMove();
}

function draw(){
  const b = document.getElementById("board");
  b.innerHTML = "";

  board.forEach((v,i)=>{
    let d = document.createElement("div");
    d.className = "cell";
    d.innerText = v;
    d.onclick = ()=>move(i);
    b.appendChild(d);
  });

  document.getElementById("status").innerText =
    active ? "Sıra: " + turn : "Oyun bitti";
}

function move(i){
  if(!active || board[i] !== "" || turn !== player) return;

  board[i] = player;
  turn = ai;

  if(check(player)){
    end(player);
    return;
  }

  draw();
  setTimeout(aiMove, 400);
}

function aiMove(){
  if(!active) return;

  let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);

  if(empty.length === 0) return;

  let i = empty[Math.floor(Math.random()*empty.length)];
  board[i] = ai;

  if(check(ai)){
    end(ai);
    return;
  }

  turn = player;
  draw();
}

function check(p){
  const w = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return w.some(c => c.every(i => board[i] === p));
}

function end(w){
  active = false;
  draw();
  document.getElementById("status").innerText = w + " kazandı!";
}

function reset(){
  board = ["","","","","","","","",""];
  active = true;
  turn = "X";
  draw();
}

</script>

</body>
</html>
