<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;

    /* ARKA PLAN */
    background-image: url("https://share.google/ozYbfLKi2zzuRbtHH");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* ÜST BAR (DEĞİŞMEDİ) */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    box-sizing: border-box;
    z-index: 10;
}

.navbar .left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.navbar img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

.navbar .menu a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

/* ORTA LOGO ALANI */
.center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid white;

    /* LOGO */
    background-image: url("https://share.google/lh6ilVB0nNrSwWz1v");
    background-size: cover;
    background-position: center;
}
</style>
</head>

<body>

<!-- ÜST BAR (AYNI KALDI) -->
<div class="navbar">

    <div class="left">
        <img src="https://share.google/lh6ilVB0nNrSwWz1v">
        <b>Serkan Games</b>
    </div>

    <div class="menu">
        <a href="#">Ana Sayfa</a>
        <a href="#">Oyunlar</a>
        <a href="#">Projeler</a>
        <a href="#">İletişim</a>
    </div>

</div>

<!-- SADECE LOGO ORTADA -->
<div class="center">
    <div class="logo"></div>
</div>

</body>
</html>
