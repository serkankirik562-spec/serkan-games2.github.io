<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* ÜST BAR */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:#bdbdbd;
color:#000;
}

/* SAĞ LOGO */
.right-title{
font-weight:bold;
}

/* ORTA ARAMA */
.search input{
padding:5px;
border-radius:6px;
border:1px solid #666;
}

/* AYAR PANEL */
.settings{
position:relative;
cursor:pointer;
}

.panel{
display:none;
position:absolute;
right:0;
top:25px;
background:#222;
color:#fff;
padding:10px;
border-radius:8px;
}

button{
margin:3px;
padding:5px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">

<!-- SOL BOŞ -->
<div></div>

<!-- ORTA ARAMA -->
<div class="search">
<input type="text" placeholder="Ara...">
</div>

<!-- SAĞ: SERKAN + AYAR -->
<div class="settings" onclick="toggle()">
<span class="right-title">SERKAN GAMES ⚙</span>

<div id="panel" class="panel">
<p>Mod Seç</p>
<button onclick="pc()">PC</button>
<button onclick="mobile()">Mobil</button>
</div>
</div>

</div>

<script>

// PANEL
function toggle(){
let p=document.getElementById("panel");
p.style.display = p.style.display=="block"?"none":"block";
}

// PC
function pc(){
document.body.style.maxWidth="1200px";
document.body.style.margin="auto";
}

// MOBİL
function mobile(){
document.body.style.maxWidth="100%";
document.body.style.margin="0";
}

</script>

</body>
</html>
