<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games - Kuaför Tycoon V2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* START LOCK */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* HUD */
.hud{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

/* CONTROL PANEL */
.panel{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.tool{
  padding:10px;
  background:#333;
  border-radius:8px;
  cursor:pointer;
}

.tool.active{
  background:#00c853;
}

/* SHOP LOCK */
.shop{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
  opacity:0.3;
  pointer-events:none;
}

.shop.unlocked{
  opacity:1;
  pointer-events:auto;
}

/* CUSTOMER AREA */
.area{
  text-align:center;
  margin-top:20px;
}

.bar{
  width:80%;
  height:20px;
  background:#333;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#00c853;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
<h2>💇 Kuaför Tycoon V2</h2>
<p>Mağazayı açmak için başla</p>
<button onclick="startGame()">BAŞLA</button>
</div>

<!-- HUD -->
<div class="hud">
<div id="name">Kuaför</div>
<div>💵 <span id="money">0</span></div>
<div>📅 Gün <span id="day">1</span></div>
</div>

<!-- SHOP -->
<div class="shop" id="shop">
<h3>🛒 MAĞAZA (kilitli değil)</h3>
<button onclick="buy()">Koltuk 100$</button>
</div>

<!-- CUSTOMER -->
<div class="area">
<h3>👤 Müşteri</h3>
<p id="customer">Hazır</p>

<div class="bar"><div class="fill" id="fill"></div></div>
<p id="msg"></p>
</div>

<!-- CONTROL PANEL -->
<div class="panel">
<div class="tool" onclick="selectTool('makas')">✂️ Makas</div>
<div class="tool" onclick="selectTool('makine')">🔌 Makine</div>
<div class="tool" onclick="selectTool('köpük')">🫧 Köpük</div>
<div class="tool" onclick="selectTool('jilet')">🪒 Jilet</div>
</div>

<script>

let money=0;
let day=1;
let tool="";
let progress=0;
let shopOpened=false;

function startGame(){
  document.getElementById("startScreen").style.display="none";
  newCustomer();
}

/* SHOP OPEN LOGIC */
function openShop(){
  if(money >= 50){
    document.getElementById("shop").classList.add("unlocked");
    shopOpened=true;
  }
}

/* TOOLS */
function selectTool(t){
  tool=t;

  document.querySelectorAll(".tool").forEach(e=>{
    e.classList.remove("active");
  });

  event.target.classList.add("active");
}

/* CUSTOMER SYSTEM */
function newCustomer(){
  progress=0;
  document.getElementById("customer").innerText="Müşteri geldi (yaklaş)";
}

/* SIMULATED CUT ANIMATION */
setInterval(()=>{
  if(tool && progress<100){
    progress+=5;

    document.getElementById("fill").style.width=progress+"%";

    if(progress==100){
      money+=20;
      document.getElementById("money").innerText=money;
      document.getElementById("msg").innerText="✔ İşlem tamamlandı";

      setTimeout(newCustomer,1000);
    }
  }
},400);

</script>

</body>
</html>
