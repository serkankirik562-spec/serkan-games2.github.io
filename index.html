<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

body.dark { background:#0a0a0a; color:white; }
body.light { background:#f2f2f2; color:black; }

.top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 15px;
  background:rgba(0,0,0,0.4);
  gap:10px;
}

/* LOGO */
.logo {
  color:#00ffcc;
  font-weight:bold;
  white-space:nowrap;
}

/* SEARCH (YUKARI TAŞINDI) */
.search {
  flex:1;
  display:flex;
  justify-content:center;
}

.search input {
  width:60%;
  max-width:400px;
  padding:8px;
  border:none;
  border-radius:8px;
  outline:none;
  background:#222;
  color:white;
}

.search button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#00ffcc;
  cursor:pointer;
  margin-left:5px;
}

/* CLOCK */
.clock {
  white-space:nowrap;
}

/* SETTINGS */
.settings-btn {
  background:#222;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* CENTER */
.center {
  text-align:center;
  margin-top:80px;
}

h1 { color:#00ffcc; }

/* PANEL */
.panel {
  position:fixed;
  right:-260px;
  top:0;
  width:230px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
}

.panel.open { right:0; }

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body class="dark">

<div class="top">

  <div class="logo">SERKAN GAMES</div>

  <div class="search">
    <input type="text" placeholder="Oyun ara...">
    <button>Ara</button>
  </div>

  <div class="clock" id="clock">00:00:00</div>

  <div class="settings-btn" onclick="togglePanel()">⚙</div>

</div>

<div class="center">
  <h1>GAMER HUB</h1>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <h3>Ayarlar</h3>
  <button onclick="toggleTheme()">🌙 / ☀ Tema</button>
</div>

<script>

// saat
function updateClock(){
  let d=new Date();
  document.getElementById("clock").innerText =
  String(d.getHours()).padStart(2,'0')+":"+
  String(d.getMinutes()).padStart(2,'0')+":"+
  String(d.getSeconds()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// panel
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}

// tema
function toggleTheme(){
  let b=document.body;
  b.classList.toggle("light");
  b.classList.toggle("dark");
}

</script>

</body>
</html>
