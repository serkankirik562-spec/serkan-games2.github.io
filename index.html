<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      padding: 40px;
      border-radius: 15px;
      background: #1f1f1f;
      box-shadow: 0 0 20px #00ffcc33;
    }

    h1 {
      font-size: 32px;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
    }

    p {
      margin-top: 10px;
      color: gray;
      font-size: 14px;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 12px;
      color: gray;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>SERKAN GAMES<br>HOŞGELDİNİZ</h1>
    <p>Sistem hazır. Oyunlar sen ekledikçe açılacak.</p>
  </div>

  <footer>Serkan Games v1.0</footer>

</body>
</html>
