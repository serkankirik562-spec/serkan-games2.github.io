<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Serkan Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    /* ÜST BAR */
    .topbar {
      background: #777;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .search-box input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    /* OYUN ALANI */
    .container {
      padding: 20px;
    }

    .game-card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- ÜST BAR -->
  <div class="topbar">
    <div class="logo">🎮 Serkan Games</div>

    <div class="search-box">
      <input type="text" placeholder="Oyun ara...">
    </div>
  </div>

  <!-- OYUN ALANI -->
  <div class="container">

    <div class="game-card">
      Buraya ilk oyunu ekleyeceğiz
    </div>

    <div class="game-card">
      Buraya ikinci oyun gelecek
    </div>

  </div>

</body>
</html>
