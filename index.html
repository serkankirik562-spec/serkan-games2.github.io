<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    overflow:hidden;
    transition:0.4s;
}

/* LIGHT (Beyaz gamer ana tema) */
.light{
    background: radial-gradient(circle at top,#ffffff,#1a1a1a 80%);
    color:white;
}

/* DARK */
.dark{
    background: radial-gradient(circle at top,#111,#000 80%);
    color:white;
}

/* ARKA PLAN PARÇACIK */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:25px 25px;
    z-index:-1;
}

/* ÜST BAR */
.navbar{
    width:100%;
    height:65px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
}

/* LOGO (AÇILIŞ ANİMASYONLU) */
.logo{
    font-size:22px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 15px white;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from { text-shadow:0 0 5px white; }
    to { text-shadow:0 0 25px white; }
}

.nav-center{
    display:flex;
    gap:10px;
    align-items:center;
}

.clock{
    font-size:14px;
}

.search{
    width:170px;
    height:35px;
    border:none;
    border-radius:10px;
    padding-left:10px;
    background:#1f1f1f;
    color:white;
    outline:none;
}

.settings-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* AYAR PANEL */
.settings{
    position:fixed;
    top:80px;
    right:20px;
    width:220px;
    background:#111;
    border-radius:15px;
    padding:20px;
    display:none;
}

.settings.active{
    display:block;
}

.close{
    color:red;
    cursor:pointer;
}

.theme-btn{
    margin-top:10px;
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* ORTA */
.center{
    height:calc(100vh - 65px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.center h1{
    font-size:45px;
    color:white;
    text-shadow:0 0 20px white;
}

.center p{
    opacity:0.7;
}

/* AÇILIŞ OVERLAY */
.splash{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:white;
    animation: fadeOut 2s forwards;
    animation-delay:1.5s;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

</style>
</head>

<body class="dark">

<div class="bg"></div>

<!-- AÇILIŞ -->
<div class="splash">SERKAN GAMES</div>

<!-- ÜST BAR -->
<div class="navbar">

<div class="logo">SERKAN GAMES</div>

<div class="nav-center">

<div class="clock" id="clock">00:00:00</div>

<input class="search" placeholder="Ara...">

<button class="settings-btn" onclick="openSettings()">⚙️</button>

</div>

</div>

<!-- AYAR -->
<div class="settings" id="settings">

<div class="close" onclick="closeSettings()">✖</div>

<button class="theme-btn" onclick="toggleTheme()">Night / Light</button>

</div>

<!-- ORTA -->
<div class="center">
<h1>HOŞGELDİNİZ</h1>
<p>Serkan Games sistem aktif</p>
</div>

<script>

/* SAAT */
function clock(){
let d = new Date();
document.getElementById("clock").innerHTML =
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
}
setInterval(clock,1000);
clock();

/* AYAR */
function openSettings(){
document.getElementById("settings").classList.add("active");
}
function closeSettings(){
document.getElementById("settings").classList.remove("active");
}

/* TEMA */
function toggleTheme(){
if(document.body.classList.contains("dark")){
document.body.classList.remove("dark");
document.body.classList.add("light");
localStorage.setItem("theme","light");
}else{
document.body.classList.remove("light");
document.body.classList.add("dark");
localStorage.setItem("theme","dark");
}
}

/* KAYIT */
window.onload = function(){
let t = localStorage.getItem("theme");
if(t){
document.body.className = t;
}
}

</script>

</body>
</html>
