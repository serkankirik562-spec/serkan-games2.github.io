<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* LANDSCAPE FIX */
@media screen and (orientation:portrait){
  body::before{
    content:"📱 Lütfen telefonu yan çevir";
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-size:20px;
  }
  .game{display:none;}
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

/* START */
.card{
  width:300px;
  margin:60px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

input, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* GAME */
.game{
  display:none;
}

/* SHOP */
.shop{
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

/* INVENTORY */
.inv{
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.item{
  display:inline-block;
  background:#444;
  padding:8px;
  margin:5px;
  border-radius:6px;
}

/* CUSTOMER */
.box{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.cut{
  display:inline-block;
  background:#444;
  padding:10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.cut:hover{
  background:#00c853;
}
</style>

</head>

<body>

<!-- START -->
<div class="card" id="start">
<h2>💇 Kuaför Tycoon</h2>
<input id="name" placeholder="Kuaför adı">
<button onclick="start()">Başla</button>
</div>

<!-- GAME -->
<div class="game" id="game">

<div class="topbar">
  <div id="bname">Kuaför</div>
  <div>💵 <span id="money">0</span></div>
  <div>📅 Gün <span id="day">1</span></div>
</div>

<!-- SHOP -->
<div class="shop">
<h3>🛒 Mağaza</h3>
<button onclick="buy('zemin')">Zemin 50$</button>
<button onclick="buy('koltuk')">Koltuk 100$</button>
</div>

<!-- INVENTORY (BAŞLANGIÇ EŞYALARI) -->
<div class="inv">
<h3>🎒 Envanter</h3>
<div class="item">✂️ Makas (satılamaz)</div>
<div class="item">💈 Tarak (satılamaz)</div>
</div>

<!-- CUSTOMER -->
<div class="box">
<h3>👤 Müşteri</h3>
<p id="customer"></p>

<div>
<div class="cut" onclick="cut('yan')">Yan</div>
<div class="cut" onclick="cut('ust')">Üst</div>
<div class="cut" onclick="cut('arka')">Arka</div>
</div>

<p id="msg"></p>
</div>

</div>

<script>

let money = 0;
let day = 1;
let target = "";

function start(){
  let n = document.getElementById("name").value;
  if(!n) n="Kuaför";

  document.getElementById("bname").innerText = n;

  document.getElementById("start").style.display="none";
  document.getElementById("game").style.display="block";

  newCustomer();
  setInterval(() => {
    day++;
    money += 15;
    document.getElementById("day").innerText = day;
    document.getElementById("money").innerText = money;
  }, 12000);
}

function newCustomer(){
  const parts = ["yan","ust","arka"];
  target = parts[Math.floor(Math.random()*parts.length)];
  document.getElementById("customer").innerText =
  "İstediği: " + target;
}

function cut(p){
  if(p === target){
    money += 25;
    document.getElementById("msg").innerText = "✔ Doğru +25$";
  }else{
    money -= 10;
    document.getElementById("msg").innerText = "❌ Yanlış -10$";
  }

  document.getElementById("money").innerText = money;
  setTimeout(newCustomer, 800);
}

function buy(item){
  let price = 0;

  if(item=="zemin") price=50;
  if(item=="koltuk") price=100;

  if(money >= price){
    money -= price;
    document.getElementById("msg").innerText =
    "✔ Satın alındı: " + item;
  }else{
    document.getElementById("msg").innerText =
    "❌ Para yok!";
  }

  document.getElementById("money").innerText = money;
}

</script>

</body>
</html>
