<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* TEK ÜST BAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#1e293b;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.menu a{
margin:0 8px;
color:white;
text-decoration:none;
}

#search{
padding:6px;
border-radius:8px;
border:none;
outline:none;
}

.clock{
margin-right:20px;
color:#38bdf8;
font-weight:bold;
}

/* İÇERİK */
.content{
padding-top:80px;
text-align:center;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:15px;
}

/* ÖZEL GÜN KARTI */
.special{
margin:20px;
padding:20px;
background:#111827;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logo" id="logoText">🎮 Serkan Games</div>

<input type="text" id="search" placeholder="Oyun ara...">

<div class="clock" id="clock">00:00:00</div>

<div class="menu">
<a href="#">Ana Sayfa</a>
<a href="#">Ayarlar</a>
</div>

</div>

<!-- İÇERİK -->
<div class="content">

<div class="card">
<h2>Oyunlar</h2>
<p>Buradan oyunlarını oynayabilirsin</p>
</div>

</div>

<script>

//// SAAT
function clock(){
let d = new Date();
document.getElementById("clock").innerText =
d.getHours()+":"+d.getMinutes()+":"+d.getSeconds();
}
setInterval(clock,1000);
clock();

//// ÖZEL GÜNLER
let today = new Date();
let gun = today.getDate();
let ay = today.getMonth()+1;

if(gun==10 && ay==11){
document.getElementById("logoText").innerText = "🇹🇷 10 Kasım";
}

if(gun==23 && ay==4){
document.getElementById("logoText").innerText = "🇹🇷 23 Nisan";
}

if(gun==18 && ay==3){
document.getElementById("logoText").innerText =
"🕊️ Şehitlerimizi Anıyoruz";

let div = document.createElement("div");
div.className="special";
div.innerHTML=`
<h2>Şehitlerimiz İçin</h2>
<p>Tüm şehitlerimize rahmet diliyoruz 🤍</p>
<p><b>Fatiha okunması niyetiyle...</b></p>
`;
document.body.appendChild(div);
}

</script>

</body>
</html>
