<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
transition:0.6s ease-in-out;
}

/* TOP BAR */
.topbar{
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
color:white;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(12px);
}

.logo{
color:#00f7ff;
font-weight:bold;
text-shadow:0 0 10px #00f7ff;
}

.search-box input{
padding:7px;
border:none;
border-radius:6px;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

.right{
display:flex;
gap:15px;
align-items:center;
}

.clock{
color:#00f7ff;
font-size:13px;
}

.settings{
cursor:pointer;
transition:0.3s;
}

.settings:hover{
transform:rotate(90deg);
color:#ff00ff;
}

/* PANEL */
.panel{
position:absolute;
right:20px;
top:90px;
width:240px;
background:rgba(0,0,0,0.85);
border-radius:10px;
padding:10px;
display:none;
}

.theme{
padding:8px;
margin:5px 0;
background:rgba(255,255,255,0.1);
cursor:pointer;
border-radius:6px;
text-align:center;
}

.theme:hover{
background:rgba(0,255,255,0.2);
}

/* KAYDET */
.save{
margin-top:10px;
padding:8px;
background:#00f7ff;
color:black;
font-weight:bold;
text-align:center;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">SERKAN GAMES</div>

<div class="search-box">
<input placeholder="Oyun ara...">
</div>

<div class="right">
<div id="clock"></div>
<div class="settings" onclick="toggle()">⚙️</div>
</div>
</div>

<div class="panel" id="panel">

<div class="theme" onclick="setTheme('space')">🌌 Uzay</div>
<div class="theme" onclick="setTheme('fire')">🔥 Fire</div>
<div class="theme" onclick="setTheme('ocean')">🌊 Ocean</div>
<div class="theme" onclick="setTheme('cyber')">⚡ Cyber</div>

<div class="save" onclick="saveTheme()">KAYDET</div>

</div>

<script>

let currentTheme="space";

/* CLOCK */
function clock(){
document.getElementById("clock").innerText=
new Date().toLocaleTimeString("tr-TR")+" | "+new Date().toLocaleDateString("tr-TR");
}
setInterval(clock,1000);
clock();

/* PANEL */
function toggle(){
let p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

/* THEMES */
function setTheme(t){
currentTheme=t;

if(t==="space"){
document.body.style.background="linear-gradient(120deg,#000,#001133,#330066)";
}
if(t==="fire"){
document.body.style.background="linear-gradient(120deg,#000,#330000,#ff3300)";
}
if(t==="ocean"){
document.body.style.background="linear-gradient(120deg,#000,#001a33,#00ccff)";
}
if(t==="cyber"){
document.body.style.background="linear-gradient(120deg,#000,#6600ff,#00ffff)";
}
}

/* SAVE */
function saveTheme(){
localStorage.setItem("theme",currentTheme);
alert("Tema kaydedildi!");
}

/* LOAD */
window.onload=function(){
let t=localStorage.getItem("theme");
if(t){
setTheme(t);
}
}

</script>

</body>
</html>
