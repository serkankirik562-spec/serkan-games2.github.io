<!-- ÜST BAR -->
<div id="topbar">
  <div class="logo">SERKAN GAMES</div>

  <input type="text" id="search" placeholder="Oyun ara...">

  <div id="datetime"></div>

  <button id="settingsBtn">⚙ Ayarlar</button>
</div>

<style>
  body {
    margin: 0;
    font-family: Arial;
  }

  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 55px;
    background: #777; /* Gri renk */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    color: white;
    z-index: 9999;
  }

  #topbar .logo {
    font-weight: bold;
    font-size: 18px;
  }

  #search {
    width: 40%;
    padding: 6px;
    border-radius: 6px;
    border: none;
  }

  #settingsBtn {
    background: #555;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>

<script>
  function updateTime() {
    const now = new Date();
    const time = now.toLocaleTimeString();
    const date = now.toLocaleDateString();
    document.getElementById("datetime").innerText = date + " | " + time;
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>
