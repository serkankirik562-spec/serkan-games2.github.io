<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
transition:0.6s;
}

/* TOP BAR */
.topbar{
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
color:white;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(12px);
}

.logo{
color:#00f7ff;
font-weight:bold;
text-shadow:0 0 10px #00f7ff;
}

.search-box input{
padding:7px;
border:none;
border-radius:6px;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

.right{
display:flex;
gap:15px;
align-items:center;
}

.clock{
color:#00f7ff;
font-size:13px;
}

.settings{
cursor:pointer;
}

/* PANEL */
.panel{
position:absolute;
right:20px;
top:90px;
width:240px;
background:rgba(0,0,0,0.85);
border-radius:10px;
padding:10px;
display:none;
}

.theme{
padding:8px;
margin:5px 0;
background:rgba(255,255,255,0.1);
cursor:pointer;
border-radius:6px;
text-align:center;
}

/* SAVE */
.save{
margin-top:10px;
padding:8px;
background:#00f7ff;
color:black;
font-weight:bold;
text-align:center;
border-radius:6px;
cursor:pointer;
}

/* 🌌 SPACE */
.space{
background:linear-gradient(120deg,#000,#001133,#330066);
animation:spaceGlow 6s infinite alternate;
}

@keyframes spaceGlow{
0%{filter:brightness(1);}
100%{filter:brightness(1.4);}
}

/* 🔥 FIRE */
.fire{
background:linear-gradient(120deg,#000,#330000,#ff3300);
animation:fireShake 0.3s infinite;
}

@keyframes fireShake{
0%{transform:translate(0px,0px);}
50%{transform:translate(1px,-1px);}
100%{transform:translate(0px,0px);}
}

/* 🌊 OCEAN */
.ocean{
background:linear-gradient(120deg,#000,#001a33,#00ccff);
animation:oceanWave 4s infinite ease-in-out;
}

@keyframes oceanWave{
0%{filter:hue-rotate(0deg);}
50%{filter:hue-rotate(20deg);}
100%{filter:hue-rotate(0deg);}
}

/* ⚡ CYBER */
.cyber{
background:linear-gradient(120deg,#000,#6600ff,#00ffff);
animation:cyberFlash 1.5s infinite;
}

@keyframes cyberFlash{
0%{filter:contrast(1);}
50%{filter:contrast(1.4) saturate(1.5);}
100%{filter:contrast(1);}
}
</style>
</head>

<body class="space">

<div class="topbar">
<div class="logo">SERKAN GAMES</div>

<div class="search-box">
<input placeholder="Oyun ara...">
</div>

<div class="right">
<div id="clock"></div>
<div class="settings" onclick="toggle()">⚙️</div>
</div>
</div>

<div class="panel" id="panel">

<div class="theme" onclick="set('space')">🌌 Uzay</div>
<div class="theme" onclick="set('fire')">🔥 Fire</div>
<div class="theme" onclick="set('ocean')">🌊 Ocean</div>
<div class="theme" onclick="set('cyber')">⚡ Cyber</div>

<div class="save" onclick="save()">KAYDET</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString("tr-TR")+" | "+new Date().toLocaleDateString("tr-TR");
},1000);

/* PANEL */
function toggle(){
let p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

/* THEME */
let current="space";

function set(t){
document.body.className=t;
current=t;
}

/* SAVE */
function save(){
localStorage.setItem("theme",current);
alert("Kaydedildi!");
}

/* LOAD */
window.onload=()=>{
let t=localStorage.getItem("theme");
if(t){
set(t);
}
}

</script>

</body>
</html>
