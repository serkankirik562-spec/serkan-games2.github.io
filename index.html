<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1606813907291-d86efa9b94db?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    overflow:hidden;
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    background:rgba(70,70,70,0.85); /* orta gri */
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:white;
    backdrop-filter:blur(8px);
}

/* SOL LOGO */
.logo{
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
}

/* ORTA ARAMA */
.search-box input{
    width:300px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    outline:none;
}

/* SAĞ TARAF */
.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.clock{
    font-size:14px;
    text-align:right;
}

.settings{
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

.settings:hover{
    transform:rotate(90deg);
}

/* ALT YAZI */
.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search-box">
        <input type="text" placeholder="Ara...">
    </div>

    <div class="right">
        <div class="clock" id="clock">--:--</div>
        <div class="settings">⚙️</div>
    </div>
</div>

<div class="center-text">
    SERKAN GAMES PANEL
</div>

<script>
function updateTime(){
    const now = new Date();

    const date = now.toLocaleDateString("tr-TR");
    const time = now.toLocaleTimeString("tr-TR");

    document.getElementById("clock").innerHTML = time + "<br>" + date;
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
