<!-- OYUN KART -->
<div style="padding:20px;">
<h2>🎮 Oyunlar</h2>

<div style="background:#222;color:white;padding:15px;width:200px;border-radius:10px;">
    <h3>Dövüş Oyunu</h3>
    <button onclick="openGame()">▶️ Oyna</button>
    <button>⬇️ İndir</button>
</div>
</div>

<!-- OYUN PANEL -->
<div id="panel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;color:white;z-index:999;">

<div style="padding:10px;background:#222;">
    <button onclick="closeGame()">⬅ Geri</button>
</div>

<!-- MENÜ -->
<div id="menu1" style="text-align:center;margin-top:80px;">
    <h2>Serkan Fight</h2>
    <input id="name" placeholder="İsim"><br><br>
    <button onclick="nextMenu()">Başla</button>
</div>

<div id="menu2" style="display:none;text-align:center;margin-top:80px;">
    <button onclick="startAI()">🤖 AI Oyna</button>
</div>

<canvas id="game"></canvas>

<div style="position:absolute;bottom:20px;width:100%;text-align:center;">
    <button onclick="attack()">👊</button>
</div>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={x:100,y:200,hp:100};
let ai={x:500,y:200,hp:100};

// MENÜ
function openGame(){
    document.getElementById("panel").style.display="block";
}
function closeGame(){
    document.getElementById("panel").style.display="none";
}
function nextMenu(){
    document.getElementById("menu1").style.display="none";
    document.getElementById("menu2").style.display="block";
}
function startAI(){
    canvas.style.display="block";
    loop();
}

// SALDIRI
function attack(){
    if(Math.abs(player.x-ai.x)<100){
        ai.hp -= 10;
    }
}

// KONTROL
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// LOOP
function loop(){

function update(){
    if(keys["a"]) player.x-=5;
    if(keys["d"]) player.x+=5;

    if(ai.x>player.x) ai.x-=2;
    if(ai.x<player.x) ai.x+=2;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,60,60);

    ctx.fillStyle="blue";
    ctx.fillRect(ai.x,ai.y,60,60);

    ctx.fillStyle="white";
    ctx.fillText("HP:"+player.hp,20,30);
    ctx.fillText("HP:"+ai.hp,ai.x,ai.y-10);
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
}
        </script>
