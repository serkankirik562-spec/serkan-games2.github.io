<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#333;
}

.search input{
  padding:6px;
  border-radius:6px;
  border:none;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  background:#1b1b1b;
}

.menu button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* PAGE */
.page{display:none;padding:20px}

/* CARD */
.card{
  width:160px;
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
  cursor:pointer;
}

/* GAME */
.game-box{
  width:320px;
  margin:auto;
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* XOX */
#board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.cell{
  width:80px;
  height:80px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🎮 Serkan Games</div>

  <div class="search">
    <input id="search" placeholder="Oyun ara..." onkeyup="searchGame()">
  </div>

  <div>⚙ Ayar</div>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="show('mini')">🕹 Mini Games</button>
  <button onclick="show('board')">🧩 Masa Oyunları</button>
</div>

<!-- MINI GAMES -->
<div id="mini" class="page" style="display:block">

  <div class="card game">XOX</div>
  <div class="card game">Hafıza</div>
  <div class="card game">Zar</div>
  <div class="card game">UNO</div>
  <div class="card game">Yapboz</div>

</div>

<!-- BOARD GAMES -->
<div id="board" class="page">

  <div class="card game">Satranç</div>
  <div class="card game">Dama</div>

</div>

<!-- GAME AREA -->
<div id="game" class="page">
  <button onclick="back()">← Geri</button>
  <div id="gameArea"></div>
</div>

<script>

/* PAGE */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function back(){
  show("mini");
}

/* SEARCH */
function searchGame(){
  let input=document.getElementById("search").value.toLowerCase();
  let cards=document.querySelectorAll(".game");

  cards.forEach(c=>{
    if(c.innerText.toLowerCase().includes(input)){
      c.style.display="inline-block";
    } else {
      c.style.display="none";
    }
  });
}

/* CLICK */
document.querySelectorAll(".game").forEach(card=>{
  card.onclick=()=>openGame(card.innerText);
});

/* OPEN GAME */
function openGame(name){

  show("game");

  let area=document.getElementById("gameArea");

  if(name=="XOX"){
    area.innerHTML=`<div class="game-box"><div id="board"></div></div>`;
    startXOX();
  }

  else{
    area.innerHTML=`
      <div class="game-box">
        <h3>${name}</h3>
        <p>Yakında eklenecek</p>
      </div>
    `;
  }
}

/* XOX */
let boardArr;

function startXOX(){
  boardArr=["","","","","","","","",""];
  draw();
}

function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  boardArr.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=v;
    d.onclick=()=>move(i);
    b.appendChild(d);
  });
}

function move(i){
  if(boardArr[i]) return;

  boardArr[i]="X";

  aiMove();
  draw();
}

function aiMove(){
  let empty=boardArr.map((v,i)=>v==""?i:null).filter(v=>v!=null);
  let r=empty[Math.floor(Math.random()*empty.length)];
  if(r!=undefined) boardArr[r]="O";
}

</script>

</body>
</html>
