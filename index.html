<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* ÜST BAR */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
background:#bdbdbd;
color:#000;
}

/* SOL BÜYÜK BAŞLIK */
.title{
font-size:24px;
font-weight:bold;
}

/* SAĞ AYAR */
.settings{
font-size:18px;
font-weight:bold;
cursor:pointer;
position:relative;
}

/* AYAR PANEL */
.panel{
display:none;
position:absolute;
right:0;
top:35px;
background:#222;
color:#fff;
padding:10px;
border-radius:8px;
min-width:120px;
}

button{
display:block;
width:100%;
margin:4px 0;
padding:6px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">

<div class="title">SERKAN GAMES</div>

<div class="settings" onclick="toggle()">
⚙ Ayarlar

<div id="panel" class="panel">
<button onclick="setPC()">PC</button>
<button onclick="setMobile()">Mobil</button>
</div>

</div>

</div>

<script>

// PANEL AÇ/KAPA
function toggle(){
let p=document.getElementById("panel");
p.style.display = (p.style.display==="block") ? "none" : "block";
}

// PC MODE
function setPC(){
document.body.style.maxWidth="1200px";
document.body.style.margin="auto";
}

// MOBILE MODE
function setMobile(){
document.body.style.maxWidth="100%";
document.body.style.margin="0";
}

</script>

</body>
</html>
