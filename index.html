<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

/* MENÜ */
#menu button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* SAYFA GİZLEME */
.page {
  display: none;
}

/* XOX */
#board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 90px;
  height: 90px;
  background: #222;
  font-size: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 10px;
}

.cell:hover {
  background: #333;
}
</style>
</head>

<body>

<h1>🎮 Serkan Oyun Sitesi</h1>

<!-- MENÜ -->
<div id="menu">
  <button onclick="showPage('home')">🏠 Ana Sayfa</button>
  <button onclick="showPage('xox')">❌⭕ XOX Oyunu</button>
</div>

<!-- ANA SAYFA -->
<div id="home" class="page" style="display:block;">
  <h2>Hoşgeldin!</h2>
  <p>Oyun seç ve oyna 🚀</p>
</div>

<!-- XOX SAYFA -->
<div id="xox" class="page">

  <h2>XOX Oyunu</h2>

  <div id="board"></div>
  <p id="status">Sıra: X</p>
  <button onclick="resetGame()">Yeniden Başla</button>

</div>

<script>

// SAYFA GEÇİŞ
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(page).style.display = "block";
}

// XOX OYUNU
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");

function createBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, i) => {
    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.onclick = () => play(i);
    boardDiv.appendChild(div);
  });
}

function play(i) {
  if (board[i] !== "" || !gameActive) return;

  board[i] = currentPlayer;
  createBoard();

  if (checkWin()) {
    statusText.innerText = currentPlayer + " kazandı!";
    gameActive = false;
    return;
  }

  if (!board.includes("")) {
    statusText.innerText = "Berabere!";
    gameActive = false;
    return;
  }

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  statusText.innerText = "Sıra: " + currentPlayer;
}

function checkWin() {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return wins.some(c =>
    c.every(i => board[i] === currentPlayer)
  );
}

function resetGame() {
  board = ["","","","","","","","",""];
  currentPlayer = "X";
  gameActive = true;
  statusText.innerText = "Sıra: X";
  createBoard();
}

createBoard();

</script>

</body>
</html>
