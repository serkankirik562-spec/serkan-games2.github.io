<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title><style>
body{
margin:0;
background:linear-gradient(135deg,#000,#001a33);
color:#fff;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
position:fixed;
top:0;
left:0;
right:0;
z-index:10;
}

.top-bar h1{
margin:0;
font-size:18px;
}

.tools{
display:flex;
gap:10px;
align-items:center;
}

input{
padding:6px;
border-radius:6px;
border:none;
outline:none;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#clock{
font-weight:bold;
}

/* INTRO */
.intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#001a33,#000);
z-index:100;
animation:fadeOut 1.5s ease 3s forwards;
}

.logo{
width:180px;
height:180px;
background:url('logo.png') center/contain no-repeat;
animation:spinOnly 2.5s ease-in-out;
}

@keyframes spinOnly{
0%{transform:rotate(0deg) scale(0.3);opacity:0;}
40%{opacity:1;}
100%{transform:rotate(720deg) scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* CHOOSE SCREEN */
.choose-screen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
z-index:90;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
}

.choice-buttons{
display:flex;
gap:20px;
}

.choice-buttons button{
padding:20px 30px;
font-size:18px;
border-radius:12px;
background:#001a33;
color:#fff;
border:1px solid #444;
transition:0.3s;
}

.choice-buttons button:hover{
background:#004080;
transform:scale(1.05);
}

/* GAME HUB */
#gameHub{
margin-top:70px;
padding:20px;
display:none;
flex-wrap:wrap;
gap:15px;
}

.card{
width:180px;
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.08);
background:rgba(0,128,255,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

.play-btn{
margin-top:8px;
padding:6px;
width:100%;
background:#004080;
color:#fff;
border:none;
border-radius:8px;
}

</style></head>
<body><!-- 1: INTRO --><div class="intro" id="intro">
  <div class="logo"></div>
</div><!-- 2: SEÇİM --><div class="choose-screen" id="chooseScreen">
  <div class="choice-buttons">
    <button onclick="selectMode('mobile')">📱 Mobil</button>
    <button onclick="selectMode('pc')">💻 PC</button>
  </div>
</div><!-- 3: TOP BAR --><div class="top-bar">
  <h1>Serkan Games</h1>
  <div class="tools">
    <div id="clock"></div>
    <input placeholder="Ara...">
    <button>⚙️</button>
  </div>
</div><!-- 4-5-6: GAME HUB --><div id="gameHub"></div><script>

// 1 SAAT
function updateClock(){
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// INTRO -> CHOOSE
setTimeout(()=>{
  document.getElementById("chooseScreen").style.display="flex";
},3000);

// PLATFORM SEÇİMİ
function selectMode(mode){
  document.getElementById("chooseScreen").style.display="none";
  document.getElementById("gameHub").style.display="flex";
  loadGames(mode);
}

// 6 OYUN SİSTEMİ (STEAM TARZI)
const games = [
  {name:"Yıkıcı Oyun", img:"https://via.placeholder.com/300x180", high:true},
  {name:"Cyber Racer", img:"https://via.placeholder.com/300x180", high:true},
  {name:"Shadow War", img:"https://via.placeholder.com/300x180", high:true},
  {name:"Mini Test (gizli)", img:"https://via.placeholder.com/300x180", high:false}
];

function loadGames(mode){
  let hub = document.getElementById("gameHub");
  hub.innerHTML="";

  games.filter(g=>g.high).forEach(g=>{
    hub.innerHTML += `
      <div class="card" onclick="openGame('${g.name}')">
        <img src="${g.img}">
        <h4>${g.name}</h4>
        <button class="play-btn">Oyna</button>
      </div>
    `;
  });
}

function openGame(name){
  alert(name + " açılıyor...");
}

</script></body>
</html>
