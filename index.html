<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#333;
  padding:12px 20px;
}

.left{ font-weight:bold; }

.center input{
  padding:6px;
  border-radius:6px;
  border:none;
}

.right button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
}

/* OYUN KUTUSU */
.game-box{
  width:320px;
  margin:40px auto;
  background:#1b1b1b;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* XOX TAHTA */
#board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:15px;
}

.cell{
  width:90px;
  height:90px;
  background:#222;
  font-size:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  cursor:pointer;
}

/* ALT YAZI */
.play-text{
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">🎮 Serkan Games</div>

  <div class="center">
    <input placeholder="Ara...">
  </div>

  <div class="right">
    <button onclick="reset()">Reset</button>
  </div>
</div>

<!-- 🔥 OYUN KUTUSU -->
<div class="game-box">

  <h3>❌⭕ XOX Yapay Zeka</h3>

  <div id="board"></div>

  <div class="play-text">👇 Oyna</div>

  <p id="status"></p>

</div>

<script>

/* OYUN */
let board=["","","","","","","","",""];
let player="X";
let ai="O";
let turn="X";
let active=true;

function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  board.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=v;
    d.onclick=()=>move(i);
    b.appendChild(d);
  });

  document.getElementById("status").innerText =
    active ? "Sıra: "+turn : "Oyun bitti";
}

/* 🔥 AKILLI AI */
function aiMove(){

  let bestScore=-999;
  let moveIndex=null;

  for(let i=0;i<9;i++){
    if(board[i]==""){

      board[i]=ai;
      let score=minimax(board,0,false);
      board[i]="";

      if(score>bestScore){
        bestScore=score;
        moveIndex=i;
      }
    }
  }

  board[moveIndex]=ai;

  if(check(ai)){
    end(ai);
    return;
  }

  turn=player;
  draw();
}

/* 🔥 MINIMAX (GERÇEK AI) */
function minimax(b,depth,isMax){

  if(check(ai)) return 10-depth;
  if(check(player)) return depth-10;
  if(!b.includes("")) return 0;

  if(isMax){
    let best=-999;

    for(let i=0;i<9;i++){
      if(b[i]==""){
        b[i]=ai;
        best=Math.max(best,minimax(b,depth+1,false));
        b[i]="";
      }
    }
    return best;
  } else {
    let best=999;

    for(let i=0;i<9;i++){
      if(b[i]==""){
        b[i]=player;
        best=Math.min(best,minimax(b,depth+1,true));
        b[i]="";
      }
    }
    return best;
  }
}

/* HAMLE */
function move(i){
  if(!active || board[i]!="") return;
  if(turn!==player) return;

  board[i]=player;

  if(check(player)){
    end(player);
    return;
  }

  turn=ai;
  draw();
  setTimeout(aiMove,300);
}

/* KAZANMA */
function check(p){
  const w=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return w.some(c=>c.every(i=>board[i]===p));
}

function end(w){
  active=false;
  draw();
  document.getElementById("status").innerText=w+" kazandı!";
}

function reset(){
  board=["","","","","","","","",""];
  player="X";
  ai="O";
  turn="X";
  active=true;
  draw();
}

/* BAŞLAT */
draw();

</script>

</body>
</html>
