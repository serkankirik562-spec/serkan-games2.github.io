<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOP BAR */
.topbar{
  background:#777;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 15px;
  position:relative;
}

/* LEFT */
.logo{
  font-weight:bold;
  font-size:18px;
}

/* CENTER SEARCH */
.search input{
  padding:6px;
  border:none;
  border-radius:5px;
  width:200px;
}

/* RIGHT SETTINGS */
.settings{
  font-size:22px;
  cursor:pointer;
}

/* DROPDOWN */
.dropdown{
  display:none;
  position:absolute;
  right:10px;
  top:45px;
  background:white;
  color:black;
  border-radius:8px;
  overflow:hidden;
  min-width:150px;
}

.dropdown div{
  padding:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.dropdown div:hover{
  background:#eee;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:transparent;
}

.active-dot{
  background:green;
}

/* EMPTY AREA */
.empty{
  text-align:center;
  margin-top:100px;
  color:#555;
}
</style>
</head>

<body id="body">

<!-- TOP BAR -->
<div class="topbar">

  <!-- LEFT -->
  <div class="logo">🎮 Serkan Games</div>

  <!-- CENTER -->
  <div class="search">
    <input type="text" placeholder="Oyun ara...">
  </div>

  <!-- RIGHT -->
  <div class="settings" onclick="toggleMenu()">⚙️</div>

  <!-- MENU -->
  <div class="dropdown" id="dropdown">

    <div onclick="setMode('pc')">
      💻 PC
      <span class="dot" id="pcDot"></span>
    </div>

    <div onclick="setMode('mobile')">
      📱 Mobil
      <span class="dot" id="mobileDot"></span>
    </div>

  </div>

</div>

<!-- EMPTY HOME -->
<div class="empty">
  <h2>🎮 Oyunlar yakında eklenecek</h2>
  <p>Serkan Games - Mini Games Platform</p>
</div>

<script>

let dropdown = document.getElementById("dropdown");

/* MENU */
function toggleMenu(){
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
}

/* MODE */
function setMode(mode){

  document.getElementById("pcDot").classList.remove("active-dot");
  document.getElementById("mobileDot").classList.remove("active-dot");

  if(mode === "pc"){
    document.getElementById("pcDot").classList.add("active-dot");
  } else {
    document.getElementById("mobileDot").classList.add("active-dot");
  }

  dropdown.style.display = "none";
}

/* DEFAULT */
document.getElementById("pcDot").classList.add("active-dot");

</script>

</body>
</html>
