<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serkan Games</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: white;
}

/* ÜST BAR */
.header {
    background: #666;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ddd;
}

.search input {
    padding: 7px;
    border: none;
    border-radius: 6px;
    outline: none;
}

/* SAYFA */
.content {
    padding: 20px;
}

/* OYUN KARTI */
.game-card {
    width: 220px;
    background: #f2f2f2;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* BUTONLAR */
.btn {
    margin-top: 10px;
    padding: 8px;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    display: block;
    text-decoration: none;
    color: white;
}

.play {
    background: #666;
}

.download {
    background: #444;
}

</style>
</head>

<body>

<!-- ÜST BAR -->
<div class="header">
    <div class="logo">Serkan Games</div>

    <div class="search">
        <input type="text" placeholder="Arama...">
    </div>
</div>

<!-- OYUN -->
<div class="content">

    <div class="game-card">
        🕷 Örümcek Oyunu<br>
        <small>Serkan tarafından yapıldı</small>

        <!-- OYNA -->
        <a href="spider.html" class="btn play">Oyna</a>

        <!-- İNDİR -->
        <a href="spider.zip" download class="btn download">İndir</a>
    </div>

</div>

</body>
</html>
