<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* 🔥 ÜST BAR */
.header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#333;
  padding:12px 20px;
  box-sizing:border-box;
}

.left{ font-weight:bold; }

.center input{
  width:220px;
  padding:6px;
  border:none;
  border-radius:6px;
}

.right button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* SAYFA */
.page{
  display:none;
  text-align:center;
  padding:20px;
}

/* XOX */
#board{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:90px;
  height:90px;
  background:#222;
  font-size:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  cursor:pointer;
}

/* GERİ TUŞU */
.back{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#555;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">🎮 Serkan Games</div>

  <div class="center">
    <input placeholder="Ara...">
  </div>

  <div class="right">
    <button onclick="show('home')">⚙ Ayar</button>
  </div>
</div>

<!-- ANA SAYFA -->
<div id="home" class="page" style="display:block;">
  <h2>Oyun Seç</h2>

  <button onclick="start('X')">Ben X olayım</button>
  <button onclick="start('O')">Ben O olayım</button>
</div>

<!-- XOX -->
<div id="game" class="page">

  <h2>XOX Yapay Zeka</h2>

  <div id="board"></div>
  <p id="status"></p>

  <button onclick="reset()">Reset</button>
  <button class="back" onclick="backHome()">← Geri</button>

</div>

<script>

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

/* 🔥 GERİ TUŞU */
function backHome(){
  show("home");
}

/* XOX AI */
let board, player, ai, turn, active;

function start(choice){
  player = choice;
  ai = choice==="X"?"O":"X";

  board=["","","","","","","","",""];
  turn="X";
  active=true;

  show("game");
  draw();

  if(ai==="X") aiMove();
}

function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  board.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=v;
    d.onclick=()=>move(i);
    b.appendChild(d);
  });

  document.getElementById("status").innerText =
    active ? "Sıra: "+turn : "Oyun bitti";
}

function move(i){
  if(!active || board[i] || turn!==player) return;

  board[i]=player;
  turn=ai;

  if(check(player)){ end(player); return; }

  draw();
  setTimeout(aiMove,400);
}

function aiMove(){
  if(!active) return;

  let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  let i=empty[Math.floor(Math.random()*empty.length)];

  board[i]=ai;

  if(check(ai)){ end(ai); return; }

  turn=player;
  draw();
}

function check(p){
  const w=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return w.some(c=>c.every(i=>board[i]===p));
}

function end(w){
  active=false;
  draw();
  document.getElementById("status").innerText=w+" kazandı!";
}

function reset(){
  start(player);
}

</script>

</body>
</html>
