<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* ÜST BAR */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:#bdbdbd;
color:#000;
border-bottom:2px solid #999;
}

/* SOL BAŞLIK */
.title{
font-size:22px;
font-weight:bold;
color:#fff;
}

/* SAAT */
.clock{
font-weight:bold;
margin:0 10px;
}

/* ARAMA */
.search input{
padding:5px;
border-radius:6px;
border:1px solid #666;
background:#eee;
outline:none;
}

/* AYAR */
.settings{
cursor:pointer;
font-weight:bold;
}

/* PC MOD */
.pc body{
max-width:1200px;
margin:auto;
}
</style>
</head>

<body>

<div class="top">

<div class="title">SERKAN GAMES</div>

<div class="clock" id="clock">00:00:00</div>

<div class="search">
<input type="text" placeholder="Ara...">
</div>

<div class="settings" onclick="toggleMode()">⚙ Ayarlar</div>

</div>

<script>

// 🕒 SAAT
setInterval(()=>{
let d=new Date();
document.getElementById("clock").innerText=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0")+":"+
String(d.getSeconds()).padStart(2,"0");
},1000);

// ⚙ MODE
let pc=false;

function toggleMode(){

pc=!pc;

if(pc){
document.body.style.maxWidth="1200px";
document.body.style.margin="auto";
alert("PC modu aktif");
}else{
document.body.style.maxWidth="100%";
document.body.style.margin="0";
alert("Mobil modu aktif");
}
}

</script>

</body>
</html>
