<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#0a0a0a,#1a0033,#001a33,#0a0a0a);
    background-size:400% 400%;
    animation:bg 8s ease infinite;
}

/* ARKA PLAN ANİMASYON */
@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ÜST BAR */
.topbar{
    width:100%;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;

    background:rgba(20,20,20,0.6);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,255,255,0.2);
    box-shadow:0 0 25px rgba(0,255,255,0.15);
}

.logo{
    font-weight:bold;
    letter-spacing:2px;
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
}

.search-box input{
    width:250px;
    padding:8px;
    border:none;
    border-radius:8px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

.search-box input::placeholder{
    color:#ccc;
}

.right{
    display:flex;
    gap:15px;
    align-items:center;
}

.clock{
    font-size:14px;
    color:#00f7ff;
}

.settings{
    cursor:pointer;
    font-size:22px;
    transition:0.3s;
}

.settings:hover{
    transform:rotate(120deg) scale(1.2);
    color:#ff00ff;
}

/* ORTA GLOW */
.glow{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:400px;
    height:400px;
    background:radial-gradient(circle,#00f7ff33,#ff00ff22,transparent 70%);
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.4);}
    100%{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search-box">
        <input placeholder="Oyun ara...">
    </div>

    <div class="right">
        <div id="clock"></div>
        <div class="settings">⚙️</div>
    </div>
</div>

<div class="glow"></div>

<script>
function clock(){
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("tr-TR");
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
