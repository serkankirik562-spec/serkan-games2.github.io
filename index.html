<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: white;
      text-align: center;
      overflow-x: hidden; /* X taşma / iç içe girme fix */
    }

    h1 {
      margin-top: 40px;
      font-size: 36px;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
      line-height: 1.2;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 60px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      width: 200px;
      height: 200px;
      background: #222;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px black;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffcc;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      color: gray;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>SERKAN GAMES<br>HOŞGELDİNİZ</h1>

  <div class="container">
    <div class="card">🧱 Minecraft</div>
    <div class="card">🕷️ Spider-Man</div>
    <div class="card">⚔️ Stick War</div>
  </div>

  <footer>Serkan Games v1.0</footer>

</body>
</html>
