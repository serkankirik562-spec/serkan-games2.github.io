<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Serkan Games</title>
</head>

<body id="body" style="margin:0; background:#0a0a0a; color:#00ffcc; font-family:Arial;">

<!-- LOGIN / REGISTER -->
<div id="auth" style="text-align:center; margin-top:80px;">

  <h2>🎮 Serkan Games</h2>

  <div id="registerBox">
    <h3>Kayıt Ol</h3>
    <input id="r_user" placeholder="Kullanıcı adı" style="padding:8px;"><br><br>
    <input id="r_pass" type="password" placeholder="Şifre" style="padding:8px;"><br><br>
    <button onclick="register()">Kayıt Ol</button>
    <p onclick="showLogin()" style="cursor:pointer; color:#00ffcc;">Giriş yap</p>
  </div>

  <div id="loginBox" style="display:none;">
    <h3>Giriş Yap</h3>
    <input id="l_user" placeholder="Kullanıcı adı" style="padding:8px;"><br><br>
    <input id="l_pass" type="password" placeholder="Şifre" style="padding:8px;"><br><br>
    <button onclick="login()">Giriş Yap</button>
    <p onclick="showRegister()" style="cursor:pointer; color:#00ffcc;">Kayıt ol</p>
  </div>

</div>

<!-- ANA SİTE -->
<div id="site" style="display:none;">

  <!-- ÜST BAR -->
  <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #00ffcc33;">
    <div>🎮 SERKAN GAMES</div>
    <div id="clock">00:00:00</div>
    <button onclick="logout()" style="background:red; color:white; border:none; padding:6px 10px;">
      Hesaptan Çık
    </button>
  </div>

  <!-- OYUN ALANI -->
  <div style="text-align:center; margin-top:50px;">
    <h2>🎮 Oyun Alanı</h2>
    <button onclick="playGame()">Oyuna Gir</button>
  </div>

</div>

<script>

// SAAT
function clock(){
  let d=new Date();
  document.getElementById("clock").innerText =
  String(d.getHours()).padStart(2,'0')+":"+
  String(d.getMinutes()).padStart(2,'0')+":"+
  String(d.getSeconds()).padStart(2,'0');
}
setInterval(clock,1000);
clock();


// REGISTER
function register(){
  let u=document.getElementById("r_user").value;
  let p=document.getElementById("r_pass").value;

  if(u && p){
    localStorage.setItem("user",u);
    localStorage.setItem("pass",p);
    localStorage.setItem("logged","true");
    openSite();
  }
}

// LOGIN
function login(){
  let u=document.getElementById("l_user").value;
  let p=document.getElementById("l_pass").value;

  let su=localStorage.getItem("user");
  let sp=localStorage.getItem("pass");

  if(u==su && p==sp){
    localStorage.setItem("logged","true");
    openSite();
  } else {
    alert("Hatalı giriş!");
  }
}

// LOGOUT
function logout(){
  localStorage.setItem("logged","false");
  location.reload();
}

// SAYFA AÇ
function openSite(){
  document.getElementById("auth").style.display="none";
  document.getElementById("site").style.display="block";
}

// KONTROL
function check(){
  if(localStorage.getItem("logged")=="true"){
    openSite();
  }
}
check();


// OYUN KORUMA
function playGame(){
  if(localStorage.getItem("logged")!="true"){
    alert("❌ Lütfen giriş yapın!");
  } else {
    alert("🎮 Oyun açıldı!");
  }
}


// MENÜ
function showLogin(){
  document.getElementById("loginBox").style.display="block";
  document.getElementById("registerBox").style.display="none";
}
function showRegister(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("registerBox").style.display="block";
}

</script>

</body>
</html>
