<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.header{
background:#555;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.game-box{
margin:30px;
padding:20px;
background:#222;
border-radius:10px;
width:200px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

#game{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:white;
}

canvas{
display:block;
background:#000;
}

.menu{
text-align:center;
margin-top:100px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>🎮 Serkan Games</div>
<div><input placeholder="Ara..."></div>
</div>

<!-- ANA SAYFA -->
<div id="home">
<div class="game-box">
<h3>Dövüş Oyunu</h3>
<button onclick="openGame()">▶ Oyna</button>
<button>⬇ İndir</button>
</div>
</div>

<!-- OYUN -->
<div id="game">

<div class="menu" id="menu">
<h2>Serkan Fight</h2>
<input id="name" placeholder="İsim"><br><br>
<button onclick="start()">Başla</button>
</div>

<canvas id="c"></canvas>

</div>

<script>

const game=document.getElementById("game");
const home=document.getElementById("home");
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let player={x:100,y:200};
let enemy={x:400,y:200};

function openGame(){
home.style.display="none";
game.style.display="block";
}

function start(){
document.getElementById("menu").style.display="none";
loop();
}

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
if(keys["a"]) player.x-=5;
if(keys["d"]) player.x+=5;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,50,50);

ctx.fillStyle="blue";
ctx.fillRect(enemy.x,enemy.y,50,50);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

</script>

</body>
</html>
