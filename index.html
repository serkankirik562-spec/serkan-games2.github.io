<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games - Oyunlar</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:#0f0f1a;
}

/* ARKA PLAN GLOW */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    z-index:-2;
}

.glow{
    position:fixed;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#00ffcc,#ff00ff,#00aaff);
    opacity:0.12;
    animation:move 10s infinite linear;
    z-index:-1;
}

@keyframes move{
    0%{transform:translate(0,0);}
    50%{transform:translate(-15%,-15%);}
    100%{transform:translate(0,0);}
}

/* HEADER */
header{
    text-align:center;
    padding:80px 20px 30px;
}

header h1{
    color:#00ffcc;
    text-shadow:0 0 15px #00ffcc;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:15px;
    transition:0.3s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00ffcc;
}

.card h3{
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00ffcc;
    font-weight:bold;
}

button:hover{
    background:#00ffaa;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<header>
    <h1>SERKAN GAMES - OYUNLAR</h1>
    <p>Seç ve oyna 🚀</p>
</header>

<div class="container">

    <div class="card">
        <h3>Snake Game</h3>
        <button onclick="openGame('https://play.google.com/store/apps/details?id=com.amelosinteractive.snake')">Oyna</button>
    </div>

    <div class="card">
        <h3>Hair Tattoo</h3>
        <button onclick="openGame('https://play.google.com/store/apps/details?id=com.wn.hairtattoo')">Oyna</button>
    </div>

    <div class="card">
        <h3>Real Sniper</h3>
        <button onclick="openGame('https://play.google.com/store/apps/details?id=com.miniclip.realsniper')">Oyna</button>
    </div>

    <div class="card">
        <h3>Turning Game</h3>
        <button onclick="openGame('https://play.google.com/store/apps/details?id=com.Eliten.Turning')">Oyna</button>
    </div>

</div>

<script>
function openGame(url){
    window.open(url, "_blank");
}
</script>

</body>
</html>
