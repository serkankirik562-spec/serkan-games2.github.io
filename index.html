<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #111827;
      border-bottom: 2px solid #00ffcc;
    }

    .logo {
      font-weight: bold;
      color: #00ffcc;
      letter-spacing: 2px;
    }

    .search input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      border-radius: 8px;
    }

    /* SETTINGS */
    .settings {
      position: relative;
      cursor: pointer;
      font-size: 18px;
    }

    .menu {
      display: none;
      position: absolute;
      right: 0;
      top: 25px;
      background: #111827;
      border: 1px solid #00ffcc;
      border-radius: 10px;
      padding: 10px;
      min-width: 120px;
    }

    .menu div {
      padding: 5px;
      cursor: pointer;
    }

    .menu div:hover {
      background: rgba(0,255,204,0.2);
    }

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="logo">SERKAN GAMES</div>

    <div class="search">
      <input type="text" placeholder="Ara...">
    </div>

    <div class="right">

      <div class="box" id="datetime">--</div>

      <div class="settings" onclick="toggleMenu()">⚙️
        <div class="menu" id="menu">
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>

    </div>

  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    window.onclick = function(e) {
      if (!e.target.closest(".settings")) {
        document.getElementById("menu").style.display = "none";
      }
    }
  </script>

</body>
</html>
