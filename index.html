<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

/* ÜST BAR */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #111;
  border-bottom: 2px solid #222;
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: bold;
  color: #00ffcc;
  letter-spacing: 2px;
}

/* SAAT */
.clock {
  font-size: 18px;
  color: #aaa;
}

/* AYARLAR */
.settings {
  background: #222;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.settings:hover {
  background: #333;
}

/* ORTA ALAN */
.center {
  margin-top: 80px;
}

h1 {
  font-size: 40px;
  color: #00ffcc;
}

/* ARAMA */
.search {
  margin-top: 20px;
}

.search input {
  width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #222;
  color: white;
}

.search button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">SERKAN GAMES</div>
  <div class="clock" id="clock">00:00:00</div>
  <div class="settings">⚙ Ayarlar</div>
</div>

<div class="center">
  <h1>GAMER MOD</h1>

  <div class="search">
    <input type="text" placeholder="Oyun ara...">
    <button>Ara</button>
  </div>
</div>

<script>
function updateClock() {
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');
  let s = String(now.getSeconds()).padStart(2,'0');

  document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
