<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Games</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:black;
}

.topbar{
    height:70px;
    width:100%;
    background:rgba(60,60,60,0.9);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
}

.search input{
    padding:7px;
    border-radius:6px;
    border:none;
    outline:none;
}
</style>
</head>

<body>

<div class="topbar">
    <div>SERKAN GAMES</div>

    <div class="search">
        <input placeholder="Ara...">
    </div>

    <div id="clock"></div>
</div>

<script>
function time(){
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("tr-TR");
}
setInterval(time,1000);
time();

// ARKA PLAN (TEST)
document.body.style.backgroundImage =
"url('https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&w=1600&q=80')";
document.body.style.backgroundSize="cover";
document.body.style.backgroundPosition="center";
</script>

</body>
</html>
