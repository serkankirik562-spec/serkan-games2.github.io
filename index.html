.section{padding:10px;}
.row{display:flex;flex-wrap:wrap;}
.card{width:140px;margin:10px;padding:10px;background:#1c2436;border-radius:10px;text-align:center;}

</div>

const miniGames=[
"XOX","Zar","Taş Kağıt","Hız Testi","Bellek","Refleks","Sayı Tahmin","Renk Yakala"

show("mini");

function show(type){

if(type=="mini")mini();
if(type=="board")board();
if(type=="premium")premium();
}

// ================= MINI =================
function mini(){

page.innerHTML="<h2>🟢 Mini Games (Ücretsiz)</h2><div class='row'>";

miniGames.forEach(g=>{
page.innerHTML+=`
<div class="card">
<h4>${g}</h4>
<button onclick="play('${g}')">Oyna</button>
</div>`;
});

page.innerHTML+="</div>";
}

// ================= BOARD =================
function board(){

page.innerHTML="<h2>♟ Masa Oyunları</h2><div class='row'>";

boardGames.forEach(g=>{

<button onclick="play('${g}')">Oyna</button>
</div>`;
});

page.innerHTML+="</div>";
}

// ================= PREMIUM =================
function premium(){

page.innerHTML="<h2>🔴 Premium Oyunlar</h2><div class='row'>";

premiumGames.forEach(g=>{

<div class="card lock">
<h4>${g}</h4>
<p>🔒 Kilitli</p>
<button onclick="alert('Premium gerekli')">Satın Al</button>
</div>`;
});

page.innerHTML+="</div>";
}
