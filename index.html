<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #111827;
      border-bottom: 2px solid #00ffcc;
    }

    .logo {
      font-weight: bold;
      color: #00ffcc;
      letter-spacing: 2px;
    }

    .search input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      border-radius: 8px;
    }

    .content {
      padding: 20px;
    }

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="logo">SERKAN GAMES</div>

    <div class="search">
      <input type="text" placeholder="Ara...">
    </div>

    <div class="box" id="datetime">--</div>

  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();
  </script>

</body>
</html>
