<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* ===== TOP BAR (TEK GRİ ALAN) ===== */
.topbar {
  background: #777;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
  position: relative;
}

/* SOL - SEARCH */
.search input {
  padding: 6px;
  border: none;
  border-radius: 5px;
  outline: none;
}

/* ORTA - LOGO */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-weight: bold;
  font-size: 20px;
}

/* SAĞ - AYAR */
.settings {
  cursor: pointer;
  font-size: 22px;
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  right: 10px;
  top: 45px;
  background: white;
  color: black;
  border-radius: 8px;
  overflow: hidden;
  min-width: 160px;
}

.dropdown div {
  padding: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.dropdown div:hover {
  background: #eee;
}

/* YEŞİL NOKTA */
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: transparent;
}

.active-dot {
  background: green;
}

/* ===== OYUN ALANI ===== */
.container {
  padding: 15px;
}

.games {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* PC */
  gap: 10px;
}

.game {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* MOBİL MOD */
.mobile .games {
  grid-template-columns: repeat(3, 1fr);
}
</style>
</head>

<body id="body" class="pc">

<!-- ===== TOP BAR ===== -->
<div class="topbar">

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Oyun ara...">
  </div>

  <!-- LOGO -->
  <div class="logo">🎮 Serkan Games</div>

  <!-- SETTINGS -->
  <div class="settings" onclick="toggleMenu()">⚙️</div>

  <!-- DROPDOWN -->
  <div class="dropdown" id="dropdown">

    <div onclick="setMode('pc')">
      💻 PC
      <span class="dot" id="pcDot"></span>
    </div>

    <div onclick="setMode('mobile')">
      📱 Mobil
      <span class="dot" id="mobileDot"></span>
    </div>

  </div>

</div>

<!-- ===== OYUN ALANI ===== -->
<div class="container">
  <h2>Oyunlar</h2>

  <div class="games">

    <div class="game">🚗 Araba Oyunu</div>
    <div class="game">❌⭕ XOX</div>
    <div class="game">🥊 Dövüş</div>
    <div class="game">🏃 Koşu</div>
    <div class="game">🎯 Aim</div>

  </div>
</div>
