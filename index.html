<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
  background: #06130f;
  color: white;
}

/* ☀ LIGHT (AÇIK YEŞİL) */
body.light {
  background: linear-gradient(135deg, #b8ffcc, #e6fff0);
  color: #111;
}

/* TOP BAR */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  gap: 10px;
}

/* LOGO */
.logo {
  font-weight: bold;
  color: #00ff99;
  letter-spacing: 2px;
  white-space: nowrap;
}

/* CLOCK */
.clock {
  white-space: nowrap;
}

/* SETTINGS */
.settings {
  background: #111;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* SPOTIFY */
.spotify-mini {
  display: flex;
  align-items: center;
}

/* CENTER */
.center {
  text-align: center;
  margin-top: 80px;
}

h1 {
  color: #00ff99;
  font-size: 40px;
  text-shadow: 0 0 10px #00ff99;
}

/* PANEL */
.panel {
  position: fixed;
  right: -260px;
  top: 0;
  width: 230px;
  height: 100%;
  background: #0b1a14;
  padding: 15px;
  transition: 0.3s;
}

.panel.open {
  right: 0;
}

button, input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
}

input[type=range] {
  width: 100%;
}
</style>
</head>

<body class="dark">

<div class="top">

  <div class="logo">SERKAN GAMES</div>

  <!-- 🎧 SPOTIFY -->
  <div class="spotify-mini">
    <iframe style="border-radius:10px"
      src="https://open.spotify.com/embed/track/1lOe9qE0vR9z4n3Yc6g1Qm"
      width="220" height="80"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <div class="clock" id="clock">00:00:00</div>

  <div class="settings" onclick="togglePanel()">⚙</div>

</div>

<div class="center">
  <h1>GAMER HUB</h1>
</div>

<!-- AYARLAR PANEL -->
<div class="panel" id="panel">

  <h3>⚙ Ayarlar</h3>

  <button onclick="toggleTheme()">🌙 / ☀ Tema</button>

  <h3>🎵 Müzik</h3>

  <button onclick="playMusic()">▶ Oynat</button>
  <button onclick="pauseMusic()">⏸ Durdur</button>

  <p>🔊 Ses</p>
  <input type="range" min="0" max="100" value="50" oninput="setVolume(this.value)">

</div>

<!-- BACKGROUND MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5b1d3b6.mp3?filename=gaming-112677.mp3" type="audio/mpeg">
</audio>

<script>

// CLOCK
function updateClock(){
  let d = new Date();
  document.getElementById("clock").innerText =
  String(d.getHours()).padStart(2,'0') + ":" +
  String(d.getMinutes()).padStart(2,'0') + ":" +
  String(d.getSeconds()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// PANEL
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
  document.body.classList.toggle("dark");
}

// MUSIC
let music = document.getElementById("music");

function playMusic(){
  music.play();
}

function pauseMusic(){
  music.pause();
}

function setVolume(v){
  music.volume = v / 100;
}

music.volume = 0.5;

</script>

</body>
</html>
