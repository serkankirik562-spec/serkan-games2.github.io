<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

/* 🌙 GECE */
body.dark {
  background: #050805;
  color: white;
}

/* ☀ GÜNDÜZ */
body.light {
  background: #f2f2f2;
  color: #111;
}

/* TOP BAR */
.top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(8px);
}

/* 🎮 NEON LOGO */
.logo {
  font-weight: bold;
  font-size: 20px;
  letter-spacing: 2px;
}

/* GECE YAZI BEYAZ */
body.dark .logo {
  color: white;
}

/* GÜNDÜZ YAZI SİYAH */
body.light .logo {
  color: black;
}

/* 🟩⬛ NEON EFEKT */
.logo span {
  color: #00ff99;
  text-shadow: 0 0 8px #00ff99;
}

/* SEARCH */
.search input {
  padding: 8px;
  border-radius: 10px;
  border: none;
  outline: none;
  width: 250px;
  background: #111;
  color: white;
}

/* CLOCK */
.clock {
  white-space: nowrap;
}

/* SETTINGS */
.settings {
  padding: 6px 10px;
  background: #111;
  border-radius: 10px;
  cursor: pointer;
}

/* PANEL */
.panel {
  position: fixed;
  right: -260px;
  top: 0;
  width: 230px;
  height: 100%;
  background: #0b1a14;
  padding: 15px;
  transition: 0.3s;
}

.panel.open {
  right: 0;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body class="dark">

<div class="top">

  <!-- 🎮 SERKAN GAMES NEON -->
  <div class="logo">
    SERKAN <span>GAMES</span>
  </div>

  <div class="search">
    <input type="text" placeholder="Oyun ara...">
  </div>

  <div class="clock" id="clock">00:00:00</div>

  <div class="settings" onclick="togglePanel()">⚙</div>

</div>

<div class="center" style="text-align:center;margin-top:80px;">
  <h1>GAMER HUB</h1>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

  <button onclick="setDark()">🌙 Gece Modu</button>
  <button onclick="setLight()">☀ Gündüz Modu</button>

</div>

<script>

// CLOCK
function updateClock(){
  let d=new Date();
  document.getElementById("clock").innerText=
  String(d.getHours()).padStart(2,'0')+":"+
  String(d.getMinutes()).padStart(2,'0')+":"+
  String(d.getSeconds()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// PANEL
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}

// 🌙 GECE
function setDark(){
  document.body.classList.add("dark");
  document.body.classList.remove("light");
}

// ☀ GÜNDÜZ
function setLight(){
  document.body.classList.add("light");
  document.body.classList.remove("dark");
}

</script>

</body>
</html>
