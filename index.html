<h1>Serkan Games</h1>
<!DOCTYPE html>
<html>
<head>
    <title>Serkan Games</title>
</head>
<body style="margin:0; background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">

<h1>Serkan Games</h1>

<input type="text" id="search" placeholder="Ara..." 
style="padding:10px; width:250px; font-size:16px;">

<button onclick="ara()" style="padding:10px 20px; margin-top:10px;">Ara</button>

<p id="sonuc"></p>

<script>
function ara(){
    let text = document.getElementById("search").value;
    document.getElementById("sonuc").innerHTML = "Aradın: " + text;
}
</script>

</body>
</html>
