<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SERKAN GAMES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;

  background-image:url("https://images.unsplash.com/photo-1605901309584-818e25960a8f");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* 🔥 DARK OVERLAY */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* ÜST BAR */
header{
  position:relative;
  z-index:2;
  background:#4b5563; /* 🔥 birleştirilen kısım */
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SOL TARAF */
.left{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

/* LOGO */
.logo{
  width:42px;
  height:42px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid gold;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ARAMA */
#search{
  padding:7px;
  border-radius:8px;
  border:none;
  width:160px;
}

/* SAAT */
#clock{
  font-size:13px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<header>

  <div class="left">
    <div class="logo">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    </div>
    <div>SERKAN GAMES</div>
  </div>

  <input id="search" placeholder="Oyun ara...">

  <div id="clock"></div>

</header>

<script>
function clock(){
  const d = new Date();
  document.getElementById("clock").innerText = d.toLocaleTimeString();
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
