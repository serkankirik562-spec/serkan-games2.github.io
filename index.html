<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<div>🎮 Serkan Games</div>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

.header{
display:flex;justify-content:space-between;
background:#333;
padding:10px;
}

.menu{
display:flex;gap:10px;
background:#1b1b1b;
padding:10px;
}

.page{display:none;padding:15px}

.card{
background:#222;
padding:10px;
margin:8px;
display:inline-block;
width:140px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.gameBox{
background:#1c1c1c;
padding:15px;
border-radius:10px;
text-align:center;
}

.grid{display:grid;gap:4px}

.cell{
width:45px;height:45px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #555;
cursor:pointer;
font-size:18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>🎮 Serkan Games 2</div>
<input id="search" placeholder="Ara..." onkeyup="searchGame()">
<button onclick="profile()">👤 Profil</button>
</div>

<!-- LOGIN -->
<div style="background:#222;padding:10px">
<input id="u" placeholder="Kullanıcı adı">
<input id="pw" placeholder="Şifre" type="password">
<button onclick="login()">Giriş / Kayıt</button>
<span id="userLabel"></span>
</div>

<!-- MENÜ -->
<div class="menu">
<button onclick="show('mini')">Mini Games</button>
<button onclick="show('board')">Masa Oyunları</button>
</div>

<!-- MINI -->
<div id="mini" class="page" style="display:block">
<div class="card game">XOX</div>
<div class="card game">Zar</div>
<div class="card game">Hafıza</div>
</div>

<!-- BOARD -->
<div id="board" class="page">
<div class="card game">Satranç</div>
<div class="card game">Dama</div>
<div class="card game">UNO</div>
<div class="card game">Yapboz</div>
</div>

<!-- GAME AREA -->
<div id="game" class="page">
<button onclick="back()">← Geri</button>
<div id="gameArea"></div>
</div>

<script>

/* ================= USER SYSTEM ================= */

let user = JSON.parse(localStorage.getItem("sg_user")) || {
name:null,
pass:null,
scores:{},
history:[]
};

function saveUser(){
localStorage.setItem("sg_user",JSON.stringify(user));
}

function login(){
user.name=u.value;
user.pass=pw.value;
saveUser();
updateUI();
}

function updateUI(){
userLabel.innerText=user.name?"👤 "+user.name:"Misafir";
}

updateUI();

/* ================= NAV ================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

function back(){show("mini");}

/* ================= SEARCH ================= */

function searchGame(){
let v=search.value.toLowerCase();
document.querySelectorAll(".game").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"inline-block":"none";
});
}

/* ================= CLICK ================= */

document.querySelectorAll(".game").forEach(c=>{
c.onclick=()=>openGame(c.innerText);
});

/* ================= TRACK ================= */

function track(game){
if(!user.name) return;
user.history.unshift(game);
user.history=user.history.slice(0,10);
saveUser();
}

/* ================= SCORE ================= */

function addScore(game,val){
if(!user.name) return;

if(!user.scores[game]) user.scores[game]=val;
else user.scores[game]=Math.max(user.scores[game],val);

saveUser();
}

/* ================= OPEN GAME ================= */

function openGame(name){
show("game");
track(name);

let a=gameArea;

/* SATRANÇ */
if(name=="Satranç"){
a.innerHTML=`
<div class="gameBox">
<h3>♟ Satranç AI</h3>
<button onclick="startChess('white')">Beyaz</button>
<button onclick="startChess('black')">Siyah</button>
<p id="status"></p>
<div id="chess"></div>
</div>`;
}

/* OTHER */
else{
a.innerHTML=`<div class="gameBox">${name}</div>`;
}
}

/* ================= CHESS ================= */

let board,side="white",sel=null,over=false;

function startChess(s){
side=s;over=false;

board=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

draw();
}

function draw(){
let b=chess;
b.innerHTML="";
b.className="grid";
b.style.gridTemplateColumns="repeat(8,45px)";

board.forEach((p,i)=>{
let d=document.createElement("div");
d.className="cell";
d.innerText=piece(p);
d.onclick=()=>move(i);
b.appendChild(d);
});

checkWin();
}

function piece(p){
return{
r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",p:"♟",
R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔",P:"♙"
}[p]||"";
}

function move(i){

if(over) return;

if(sel==null){
if(board[i]) sel=i;
}else{
board[i]=board[sel];
board[sel]="";
sel=null;
draw();
setTimeout(ai,200);
}
}

/* AI */
function ai(){
let m=[];

for(let i=0;i<64;i++){
if(board[i] && board[i]==board[i].toLowerCase()){
[-1,1,8,-8].forEach(d=>{
let t=i+d;
if(t>=0&&t<64) m.push([i,t]);
});
}
}

if(!m.length) return;

let r=m[Math.floor(Math.random()*m.length)];

board[r[1]]=board[r[0]];
board[r[0]]="";

draw();
}

/* WIN */
function checkWin(){
if(!board.includes("K")){
status.innerText="♟ Siyah kazandı";
over=true;
}
if(!board.includes("k")){
status.innerText="♟ Beyaz kazandı";
over=true;
}
}

/* ================= PROFILE ================= */

function profile(){

if(!user.name){
alert("Giriş yap");
return;
}

let t="👤 "+user.name+"\n\n🏆 Rekorlar:\n";

for(let k in user.scores){
t+=k+" : "+user.scores[k]+"\n";
}

t+="\n🎮 Geçmiş:\n";
user.history.forEach(h=>t+="- "+h+"\n");

alert(t);
}

</script>

</body>
</html>
