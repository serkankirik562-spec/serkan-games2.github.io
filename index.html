<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serkan Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.5s;
    }

    /* TEMALAR */
    .normal {
      background: #0a0f1f;
      color: white;
    }

    .kurban {
      background: linear-gradient(135deg, #052e16, #14532d);
      color: white;
    }

    .ramazan {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 2px solid gold;
      background: rgba(0,0,0,0.4);
    }

    .logo {
      font-weight: bold;
      color: gold;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      border-radius: 8px;
    }

    .search input {
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

  </style>
</head>

<body id="body">

  <div class="topbar">
    <div class="logo">SERKAN GAMES</div>

    <div class="search">
      <input type="text" placeholder="Ara...">
    </div>

    <div class="box" id="datetime">--</div>
  </div>

  <div class="content">
    <div class="card">
      <h3>🎮 Sistem</h3>
      <p id="modeText">Tema yükleniyor...</p>
    </div>

    <div class="card">
      <h3>📅 Özel Günler</h3>
      <ul>
        <li>1 Ocak - Yeni Yıl</li>
        <li>23 Nisan - Ulusal Egemenlik ve Çocuk Bayramı</li>
        <li>19 Mayıs - Gençlik Bayramı</li>
        <li>29 Ekim - Cumhuriyet Bayramı</li>
        <li>Kurban / Ramazan Bayramı (otomatik dönem)</li>
      </ul>
    </div>
  </div>

  <script>
    const body = document.getElementById("body");

    function updateTime() {
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    function setTheme(theme, text) {
      body.className = theme;
      document.getElementById("modeText").innerText = text;
    }

    function detectHoliday() {
      const now = new Date();
      const d = now.getDate();
      const m = now.getMonth() + 1;

      // SABİT BAYRAMLAR
      if (m === 1 && d === 1) {
        setTheme("normal", "🎉 Yeni Yıl Modu");
      }
      else if (m === 4 && d === 23) {
        setTheme("normal", "🇹🇷 23 Nisan Modu");
      }
      else if (m === 5 && d === 19) {
        setTheme("normal", "🇹🇷 19 Mayıs Modu");
      }
      else if (m === 10 && d === 29) {
        setTheme("normal", "🇹🇷 29 Ekim Modu");
      }

      // TAHMİNİ KURBAN BAYRAMI DÖNEMİ (Haziran - Temmuz)
      else if (m === 6 || m === 7) {
        setTheme("kurban", "🐑 Kurban Bayramı Teması (Tahmini Dönem)");
      }

      // NORMAL GÜN
      else {
        setTheme("normal", "🎮 Normal Gamer Modu");
      }
    }

    detectHoliday();
  </script>

</body>
</html>
