<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serkan Fight Online</title>

<style>
body{margin:0;background:#111;color:white;font-family:Arial;overflow:hidden}

.bar{
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
display:flex;gap:15px;z-index:10;
}

button{padding:10px 20px}

#gameScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%}

.menu{text-align:center;margin-top:80px}

canvas{display:none}

#arena{
position:absolute;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
background:black;font-size:30px;z-index:999;
animation:fade 1s;
}

@keyframes fade{
0%{opacity:0}50%{opacity:1}100%{opacity:0}
}

.mobile{position:absolute;bottom:20px;width:100%;display:flex;justify-content:center;gap:20px}

.block{position:absolute;bottom:120px;width:100%;text-align:center}
</style>
</head>

<body>

<div class="bar">
<button onclick="openGame()">🎮 Oyna</button>
<button>⬇ İndir</button>
</div>

<div id="gameScreen">

<div id="arena">ARENA BAŞLIYOR...</div>

<div id="menu" class="menu">
<h2>Serkan Fight</h2>
<input id="name" placeholder="İsim"><br><br>
<select id="char">
<option value="red">Kırmızı</option>
<option value="blue">Mavi</option>
</select><br><br>
<button onclick="next()">Başla</button>
</div>

<div id="mode" class="menu" style="display:none">
<button onclick="startAI()">🤖 AI</button>
<button onclick="startOnline()">👥 Online</button>
</div>

<canvas id="c"></canvas>

<div class="mobile">
<button onclick="attack('left')">👊</button>
<button onclick="attack('right')">💥</button>
</div>

<div class="block">
<button onmousedown="block=true" onmouseup="block=false">🛡</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

let socket,players={},myId;
let aiMode=false,gameEnded=false;

const c=document.getElementById("c");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let player={x:100,y:200,hp:100,lives:3};
let ai={x:500,y:200,hp:100,lives:3};

let block=false,combo=0,last=0;

function openGame(){document.getElementById("gameScreen").style.display="block"}

function next(){
menu.style.display="none";
mode.style.display="block";
}

function arena(){
let a=document.getElementById("arena");
a.style.display="flex";
setTimeout(()=>a.style.display="none",1200);
}

function attack(type){
if(gameEnded) return;

let now=Date.now();
combo = now-last<600 ? combo+1 : 1;
last=now;

let dmg=(type=="left"?5:10)+combo;

if(aiMode){
if(Math.abs(player.x-ai.x)<100){
if(!block){
ai.hp-=dmg;
checkDeath(ai);
hit();
}
}
}else{
socket.emit("attack",{type,combo});
}
}

function hit(){
c.style.transform="translateX(5px)";
setTimeout(()=>c.style.transform="translateX(0)",100);
}

function checkDeath(t){
if(t.hp<=0){
t.lives--;
t.hp=100;
t.x=100const express=require("express");
const http=require("http");
const {Server}=require("socket.io");

const app=express();
const server=http.createServer(app);
const io=new Server(server);

app.use(express.static("public"));

let players={};

io.on("connection",(socket)=>{

players[socket.id]={
x:100,y:200,hp:100,lives:3,name:"Oyuncu",color:"red"
};

socket.on("join",(d)=>{
players[socket.id].name=d.name;
players[socket.id].color=d.color;
});

socket.on("move",(p)=>{
players[socket.id].x=p.x;
players[socket.id].y=p.y;
});

socket.on("attack",(d)=>{

for(let id in players){
if(id!==socket.id){

let p=players[id];

if(Math.abs(p.x-players[socket.id].x)<100){

p.hp-=(d.type=="left"?5:10)+d.combo;

if(p.hp<=0){
p.lives--;
p.hp=100;
p.x=Math.random()*400;

if(p.lives<=0){
io.emit("gameOver",id);
}
}
}
}
}
});

socket.on("disconnect",()=>{
delete players[socket.id];
});

setInterval(()=>{
io.emit("players",players);
},50);

});

server.listen(3000);
