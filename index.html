<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Serkan Games</title>

<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* TOP BAR */
#topbar {
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.6);
}

#title {
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

/* GAME MENU */
#gameArea {
display:flex;
padding:20px;
gap:20px;
}

.card {
width:220px;
background:#1c1c1c;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card:hover {
transform:scale(1.05);
}

canvas {
background:linear-gradient(#87ceeb,#d0f0ff);
border-radius:10px;
display:none;
}

/* MENU */
.menu {
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:10px;
}

button {
margin:5px;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="topbar">
<div id="title">SERKAN GAMES</div>
<div id="time"></div>
</div>

<div id="gameArea">

<div class="card" onclick="startGame()">
<h3>🕷 Spider Swing</h3>
<p>İpe tutun, sallan, finish'e ulaş!</p>
</div>

<div class="card">
<h3>⚙ Ayarlar</h3>
<p>Ses & titreşim sistemi hazır</p>
</div>

</div>

<canvas id="game" width="800" height="400"></canvas>

<div class="menu" id="menu">
<h3>LEVEL TAMAMLANDI ⭐</h3>
<button onclick="nextLevel()">İleri</button>
<button onclick="home()">Ev</button>
<button onclick="settings()">Ayarlar</button>
</div>

<script>

/* SAAT */
setInterval(()=>{
document.getElementById("time").innerHTML = new Date().toLocaleString();
},1000);

/* GAME */
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let x=50,y=300;
let vx=0,vy=0;
let ground=300;
let finishX=700;

let lastTap=0;

/* START */
function startGame(){
document.getElementById("gameArea").style.display="none";
canvas.style.display="block";
loop();
}

/* KONTROLLER */
document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowRight") vx=3;
if(e.key=="ArrowLeft") vx=-3;
});

document.addEventListener("keyup",()=>vx=0);

/* MOBİL */
document.addEventListener("touchstart",()=>{
let now = Date.now();

if(now-lastTap < 300){
vy = -8; // çift tık zıplama
}else{
vx = 2; // basılı tut ileri
}

lastTap = now;
});

document.addEventListener("touchend",()=>vx=0);

/* LOOP */
function loop(){

ctx.clearRect(0,0,800,400);

/* yer çekimi */
vy += 0.3;
y += vy;
x += vx;

if(y > ground){
y = ground;
vy = 0;
}

/* ip (swing efekti) */
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x+30,y-80);
ctx.stroke();

/* finish */
ctx.fillStyle="gold";
ctx.fillRect(finishX,250,20,100);

/* oyuncu */
ctx.fillStyle="red";
ctx.fillRect(x,y-20,20,20);

/* finish kontrol */
if(x > finishX){
document.getElementById("menu").style.display="block";
}

requestAnimationFrame(loop);
}

/* LEVEL */
function nextLevel(){
finishX += 200;
document.getElementById("menu").style.display="none";
}

function home(){
location.reload();
}

/* SETTINGS */
function settings(){
alert("Serkan Games: Ses & titreşim sistemi hazır (UI boş)");
}

</script>

</body>
</html>
