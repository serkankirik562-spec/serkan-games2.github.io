<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Benzinci Oyunu</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #2b2b2b;
}

/* Oyun alanı */
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #3a3a3a;
}

/* Yol */
.road {
  position: absolute;
  background: #555;
}

/* Oyuncu */
#player {
  position: absolute;
  width: 40px;
  height: 40px;
  background: red;
  border-radius: 8px;
}

/* Kontroller */
.btn {
  position: absolute;
  width: 70px;
  height: 70px;
  background: rgba(255,255,255,0.2);
  border: 2px solid white;
  border-radius: 10px;
  color: white;
  font-size: 20px;
  text-align: center;
  line-height: 70px;
  user-select: none;
}

#up { bottom: 120px; left: 90px; }
#down { bottom: 20px; left: 90px; }
#left { bottom: 70px; left: 10px; }
#right { bottom: 70px; left: 170px; }

</style>
</head>

<body>

<div id="game">

  <!-- L yol -->
  <div class="road" style="width:100%; height:80px; top:40%;"></div>
  <div class="road" style="width:80px; height:100%; left:60%;"></div>

  <!-- Oyuncu -->
  <div id="player"></div>

  <!-- Kontroller -->
  <div id="up" class="btn">⬆</div>
  <div id="down" class="btn">⬇</div>
  <div id="left" class="btn">⬅</div>
  <div id="right" class="btn">➡</div>

</div>

<script>
let player = document.getElementById("player");

let x = 50;
let y = 50;

let speed = 4;

let keys = {};

function move() {
  if(keys["up"]) y -= speed;
  if(keys["down"]) y += speed;
  if(keys["left"]) x -= speed;
  if(keys["right"]) x += speed;

  player.style.left = x + "px";
  player.style.top = y + "px";

  requestAnimationFrame(move);
}
move();

/* Dokunmatik kontroller */
function hold(id, key){
  let btn = document.getElementById(id);

  btn.ontouchstart = () => keys[key] = true;
  btn.ontouchend = () => keys[key] = false;

  btn.onmousedown = () => keys[key] = true;
  btn.onmouseup = () => keys[key] = false;
}

hold("up","up");
hold("down","down");
hold("left","left");
hold("right","right");

</script>

</body>
</html>
